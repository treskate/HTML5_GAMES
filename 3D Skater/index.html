<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Pro Skater (THPS Style)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            background-color: #888;
        }
        canvas {
            display: block;
        }

        /* --- HUD Layout --- */
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: #fff;
            text-shadow: 2px 2px #000;
            pointer-events: none;
            box-sizing: border-box;
        }
        #top-left-hud {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        #score-label, #score-value {
            font-size: 26px;
            text-transform: uppercase;
        }
        #score-value {
            color: #ff0;
            font-weight: bold;
        }
        #special-bar-container {
            width: 200px;
            height: 15px;
            border: 3px solid #666;
            background-color: #333;
            margin-top: 5px;
            position: relative;
        }
        #special-bar-fill {
            height: 100%;
            background-color: #0f0;
            width: 20%;
            box-shadow: 0 0 10px #0f0;
            transition: width 0.2s ease;
        }
        #special-text {
            position: absolute;
            top: -2px;
            left: 5px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }
        #top-right-hud {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 36px;
            color: #f33;
            font-weight: bold;
        }
        #bottom-center-hud {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
        }
        #trick-text {
            font-size: 26px;
            margin-bottom: 5px;
            color: #00ffcc;
            font-weight: bold;
            min-height: 30px;
        }
        #combo-score {
            font-size: 22px;
            color: #ff0;
        }
        #multiplier {
            color: #fff;
        }
        #controls-guide {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #ccc;
            font-size: 12px;
            text-align: right;
            text-shadow: 1px 1px #000;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="top-left-hud">
            <div id="score-label">SCORE</div>
            <div id="score-value">00000</div>
            <div id="special-bar-container">
                <div id="special-bar-fill"></div>
                <span id="special-text">SPECIAL</span>
            </div>
        </div>
        <div id="top-right-hud">2:00</div>
        <div id="bottom-center-hud">
            <div id="trick-text"></div>
            <div id="combo-score"></div>
        </div>
    </div>

    <div id="controls-guide">
        WASD / Arrows: Steer | Spacebar: Ollie (Jump) | Shift: Kickflip | W / I Key: Hold to Grind Rails & Ledges
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/build/three.min.js"></script>

    <script>
        // --- Game Scoring State ---
        let totalScore = 0;
        let currentComboPoints = 0;
        let currentComboMultiplier = 0;
        let specialMeter = 20;
        let activeTricks = [];
        let timerSeconds = 120;

        // --- 3D Engine Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xb0c4de, 0.012); 
        scene.background = new THREE.Color(0xb0c4de);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Intentionally blocky PS1 feel
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Procedural PS1 Textures Generator ---
        function createGridTexture(col1, col2) {
            const canvas = document.createElement('canvas');
            canvas.width = 64; 
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = col1;
            ctx.fillRect(0,0,64,64);
            ctx.fillStyle = col2;
            ctx.fillRect(0,0,32,32);
            ctx.fillRect(32,32,32,32);
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.magFilter = THREE.NearestFilter; // Sharp, non-blurry retro pixels
            return tex;
        }

        const roofTex = createGridTexture('#96634e', '#80523e');
        roofTex.repeat.set(40,40);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xfff5e6, 0.9);
        sunLight.position.set(40, 60, 20);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // --- World Floor ---
        const groundGeo = new THREE.PlaneGeometry(300, 300);
        const groundMat = new THREE.MeshLambertMaterial({ map: roofTex });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Obstacle Databases ---
        const obstacles = [];
        const rails = [];

        // Obstacle Factories
        function addKickerRamp(x, z, rotY) {
            const geom = new THREE.BufferGeometry();
            const vertices = new Float32Array([
                -3, 0,  4,   3, 0,  4,   -3, 2, -4,  // Triangle 1
                 3, 0,  4,   3, 2, -4,   -3, 2, -4,  // Triangle 2
                -3, 0,  4,  -3, 2, -4,   -3, 0, -4,  // Left wall
                 3, 0,  4,   3, 0, -4,    3, 2, -4,  // Right wall
                -3, 2, -4,   3, 2, -4,    3, 0, -4,  // Back wall
                -3, 2, -4,   3, 0, -4,   -3, 0, -4
            ]);
            geom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            geom.computeVertexNormals();
            const mat = new THREE.MeshLambertMaterial({ color: 0x556b2f });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(x, 0, z);
            mesh.rotation.y = rotY;
            scene.add(mesh);
            obstacles.push({ mesh: mesh, type: 'ramp', width: 6, depth: 8, height: 2 });
        }

        function addQuarterPipe(x, z, rotY) {
            const meshGroup = new THREE.Group();
            const steps = 10;
            const w = 16, h = 5, d = 8;
            for(let i=0; i<steps; i++) {
                const ratio = i / steps;
                const nextRatio = (i+1) / steps;
                const currH = Math.pow(ratio, 2) * h;
                const nextH = Math.pow(nextRatio, 2) * h;
                const currZ = (1 - ratio) * d - d/2;
                const nextZ = (1 - nextRatio) * d - d/2;
                
                const stepGeo = new THREE.BoxGeometry(w, nextH, Math.abs(currZ - nextZ) + 0.1);
                const stepMat = new THREE.MeshLambertMaterial({ color: i%2===0 ? 0x444444 : 0x666666 });
                const step = new THREE.Mesh(stepGeo, stepMat);
                step.position.set(0, nextH/2, (currZ + nextZ)/2);
                meshGroup.add(step);
            }
            meshGroup.position.set(x, 0, z);
            meshGroup.rotation.y = rotY;
            scene.add(meshGroup);
            obstacles.push({ mesh: meshGroup, type: 'pipe', width: w, depth: d, height: h });
        }

        function addGrindRail(startX, startZ, endX, endZ, height=1.0) {
            const start = new THREE.Vector3(startX, height, startZ);
            const end = new THREE.Vector3(endX, height, endZ);
            const distance = start.distanceTo(end);
            
            const pipeGeo = new THREE.CylinderGeometry(0.15, 0.15, distance);
            const pipeMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.9, roughness: 0.1 });
            const pipe = new THREE.Mesh(pipeGeo, pipeMat);
            
            pipe.position.copy(start).add(end).multiplyScalar(0.5);
            pipe.lookAt(end);
            pipe.rotation.x += Math.PI / 2;
            scene.add(pipe);

            // Stanchions (Feet)
            const footGeo = new THREE.CylinderGeometry(0.08, 0.08, height);
            const footMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
            const foot1 = new THREE.Mesh(footGeo, footMat); foot1.position.set(startX, height/2, startZ); scene.add(foot1);
            const foot2 = new THREE.Mesh(footGeo, footMat); foot2.position.set(endX, height/2, endZ); scene.add(foot2);

            rails.push({ start: start, end: end, height: height });
        }

        // --- Build out the Skatepark Level ---
        addKickerRamp(0, -20, 0);
        addKickerRamp(15, 20, Math.PI);
        addQuarterPipe(-40, 0, Math.PI / 2);
        addQuarterPipe(40, 0, -Math.PI / 2);
        addGrindRail(-15, -40, -15, 10);
        addGrindRail(10, -10, 30, -10);

        // --- Procedural Compound Player Character Skeleton ---
        const skaterRoot = new THREE.Group();
        const boardContainer = new THREE.Group();
        skaterRoot.add(boardContainer);

        // Skateboard Deck
        const deckMesh = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.1, 3.2), new THREE.MeshLambertMaterial({ color: 0x111111 }));
        deckMesh.position.y = 0.2;
        boardContainer.add(deckMesh);

        // Core Body Nodes
        const bodyGroup = new THREE.Group();
        bodyGroup.position.y = 0.2; 
        skaterRoot.add(bodyGroup);

        const legs = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.0, 0.6), new THREE.MeshLambertMaterial({ color: 0x223355 }));
        legs.position.y = 0.5;
        bodyGroup.add(legs);

        const shirt = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), new THREE.MeshLambertMaterial({ color: 0xcc3333 }));
        shirt.position.y = 1.5;
        bodyGroup.add(shirt);

        const head = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.45, 0.45), new THREE.MeshLambertMaterial({ color: 0xffcc99 }));
        head.position.y = 2.3;
        bodyGroup.add(head);

        // Articulated Arms
        const leftArmRoot = new THREE.Group(); leftArmRoot.position.set(-0.55, 1.9, 0); bodyGroup.add(leftArmRoot);
        const leftArmGeom = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1.0, 0.25), new THREE.MeshLambertMaterial({ color: 0xffcc99 }));
        leftArmGeom.position.y = -0.4; leftArmRoot.add(leftArmGeom);

        const rightArmRoot = new THREE.Group(); rightArmRoot.position.set(0.55, 1.9, 0); bodyGroup.add(rightArmRoot);
        const rightArmGeom = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1.0, 0.25), new THREE.MeshLambertMaterial({ color: 0xffcc99 }));
        rightArmGeom.position.y = -0.4; rightArmRoot.add(rightArmGeom);

        scene.add(skaterRoot);

        // --- Physics & Control Tracking System ---
        let speed = 0;
        let heading = 0;
        let yVelocity = 0;
        let isGrounded = true;
        let isGrinding = false;
        
        let flipSpinActive = false;
        let flipAngle = 0;

        const keys = { w: false, a: false, s: false, d: false, space: false, shift: false };

        window.addEventListener('keydown', e => {
            if(e.key === 'w' || e.key === 'ArrowUp') keys.w = true;
            if(e.key === 'a' || e.key === 'ArrowLeft') keys.a = true;
            if(e.key === 's' || e.key === 'ArrowDown') keys.s = true;
            if(e.key === 'd' || e.key === 'ArrowRight') keys.d = true;
            if(e.key === ' ') keys.space = true;
            if(e.key === 'Shift') keys.shift = true;
        });
        window.addEventListener('keyup', e => {
            if(e.key === 'w' || e.key === 'ArrowUp') keys.w = false;
            if(e.key === 'a' || e.key === 'ArrowLeft') keys.a = false;
            if(e.key === 's' || e.key === 'ArrowDown') keys.s = false;
            if(e.key === 'd' || e.key === 'ArrowRight') keys.d = false;
            if(e.key === ' ') keys.space = false;
            if(e.key === 'Shift') keys.shift = false;
        });

        // --- Combo Accounting Operations ---
        function registerTrick(name, basePoints) {
            if (!activeTricks.includes(name)) {
                activeTricks.push(name);
                if (currentComboPoints === 0) {
                    currentComboPoints = basePoints;
                    currentComboMultiplier = 1;
                } else {
                    currentComboPoints += basePoints;
                    currentComboMultiplier++;
                }
                updateHUD();
            }
        }

        function landCombo() {
            if (currentComboPoints > 0) {
                totalScore += (currentComboPoints * currentComboMultiplier);
                specialMeter = Math.min(100, specialMeter + (currentComboMultiplier * 8));
                currentComboPoints = 0;
                currentComboMultiplier = 0;
                activeTricks = [];
                updateHUD();
            }
        }

        function bailCombo() {
            currentComboPoints = 0;
            currentComboMultiplier = 0;
            activeTricks = [];
            document.getElementById('trick-text').innerText = "BAIL! +0";
            setTimeout(() => { document.getElementById('trick-text').innerText = ""; }, 1200);
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('score-value').innerText = Math.floor(totalScore).toString().padStart(5, '0');
            document.getElementById('special-bar-fill').style.width = specialMeter + '%';
            
            if (currentComboPoints > 0) {
                document.getElementById('trick-text').innerText = activeTricks.join(" + ");
                document.getElementById('combo-score').innerHTML = `${currentComboPoints} <span id="multiplier">X${currentComboMultiplier}</span>`;
            } else if (activeTricks.length === 0) {
                document.getElementById('combo-score').innerHTML = "";
            }
        }

        // --- Game Tick Processing ---
        function animate() {
            requestAnimationFrame(animate);

            // Handle Clock System
            timerSeconds -= (1/60);
            if(timerSeconds <= 0) { timerSeconds = 120; totalScore = 0; }
            const mins = Math.floor(timerSeconds/60);
            const secs = Math.floor(timerSeconds%60);
            document.getElementById('top-right-hud').innerText = `${mins}:${secs.toString().padStart(2,'0')}`;

            // Handle Steering
            if (keys.a) heading += 0.045;
            if (keys.d) heading -= 0.045;
            skaterRoot.rotation.y = heading;

            // Handle Throttle Drive
            if (keys.w && isGrounded) speed += (0.42 - speed) * 0.06;
            else if (keys.s && isGrounded) speed += (-0.2 - speed) * 0.08;
            else if (isGrounded) speed *= 0.97;

            // Update Positions
            if (!isGrinding) {
                skaterRoot.position.x += speed * Math.sin(heading);
                skaterRoot.position.z += speed * Math.cos(heading);
            }

            // --- Jumping / Ollie Logic ---
            if (keys.space && isGrounded) {
                yVelocity = 0.32;
                isGrounded = false;
                isGrinding = false;
                registerTrick("OLLIE", 50);
            }

            // --- Kickflip Trick Logic ---
            if (keys.shift && !isGrounded && !flipSpinActive) {
                flipSpinActive = true;
                flipAngle = 0;
                registerTrick("KICKFLIP", 250);
            }

            if (flipSpinActive) {
                flipAngle += 0.4;
                boardContainer.rotation.z = flipAngle;
                if (flipAngle >= Math.PI * 2) {
                    boardContainer.rotation.z = 0;
                    flipSpinActive = false;
                }
            }

            // --- Environment Collisions & Object Processing ---
            let currentFloor = 0;

            obstacles.forEach(obs => {
                let localX = skaterRoot.position.x - obs.mesh.position.x;
                let localZ = skaterRoot.position.z - obs.mesh.position.z;

                // Rotate local positions to match object rotation alignment
                const cos = Math.cos(-obs.mesh.rotation.y);
                const sin = Math.sin(-obs.mesh.rotation.y);
                let rotX = localX * cos - localZ * sin;
                let rotZ = localX * sin + localZ * cos;

                if (Math.abs(rotX) < obs.width/2 && Math.abs(rotZ) < obs.depth/2) {
                    if (obs.type === 'ramp') {
                        let ascentRatio = (obs.depth / 2 - rotZ) / obs.depth;
                        currentFloor = ascentRatio * obs.height;
                    }
                    if (obs.type === 'pipe') {
                        let entryRatio = (rotZ + obs.depth/2) / obs.depth;
                        currentFloor = Math.pow(entryRatio, 2) * obs.height;
                        
                        // Launch vector mechanics at edge lip
                        if (entryRatio > 0.9 && isGrounded && speed > 0.1) {
                            isGrounded = false;
                            yVelocity = speed * 1.5;
                            speed *= 0.2;
                        }
                    }
                }
            });

            // --- Grinding Detection Loop ---
            if ((keys.w || keys.w === false) && !isGrounded && yVelocity <= 0 && !isGrinding) {
                rails.forEach(rail => {
                    const playerPos = skaterRoot.position;
                    // Proximity check line math distance
                    let distToLine = Math.abs((rail.end.z - rail.start.z) * playerPos.x - (rail.end.x - rail.start.x) * playerPos.z + rail.end.x * rail.start.z - rail.end.z * rail.start.x) / Math.sqrt(Math.pow(rail.end.z - rail.start.z, 2) + Math.pow(rail.end.x - rail.start.x, 2));
                    
                    if (distToLine < 1.2 && playerPos.y >= rail.height - 0.5 && playerPos.y <= rail.height + 1.0) {
                        // Confirm within segment endpoints bounding domain box
                        let minZ = Math.min(rail.start.z, rail.end.z) - 1;
                        let maxZ = Math.max(rail.start.z, rail.end.z) + 1;
                        if (playerPos.z >= minZ && playerPos.z <= maxZ) {
                            isGrinding = true;
                            isGrounded = true;
                            skaterRoot.position.y = rail.height;
                            yVelocity = 0;
                            // Calculate rail orientation heading vector direction
                            heading = Math.atan2(rail.end.x - rail.start.x, rail.end.z - rail.start.z);
                        }
                    }
                });
            }

            if (isGrinding) {
                registerTrick("50-50 GRIND", 400);
                currentComboPoints += 2; // Tick upward during grind duration
                updateHUD();

                // Drive forward along the rail
                skaterRoot.position.x += 0.25 * Math.sin(heading);
                skaterRoot.position.z += 0.25 * Math.cos(heading);

                // Check end of rail boundary termination drop
                let onRail = false;
                rails.forEach(rail => {
                    let minZ = Math.min(rail.start.z, rail.end.z) - 1;
                    let maxZ = Math.max(rail.start.z, rail.end.z) + 1;
                    if (skaterRoot.position.z >= minZ && skaterRoot.position.z <= maxZ && Math.abs(skaterRoot.position.x - rail.start.x) < 2) {
                        onRail = true;
                    }
                });

                if (!onRail || keys.space) {
                    isGrinding = false;
                    isGrounded = false;
                    if (keys.space) { yVelocity = 0.25; } // Pop out drop down
                }
            }

            // --- Vertical Gravity Processing ---
            if (!isGrounded) {
                yVelocity -= 0.013;
                skaterRoot.position.y += yVelocity;

                if (skaterRoot.position.y <= currentFloor) {
                    skaterRoot.position.y = currentFloor;
                    yVelocity = 0;
                    isGrounded = true;
                    
                    if (flipSpinActive) {
                        bailCombo(); // Crashed mid flip rotation loop
                        boardContainer.rotation.z = 0;
                        flipSpinActive = false;
                    } else {
                        landCombo();
                    }
                }
            } else if (!isGrinding) {
                // Ground clamping adhesion
                skaterRoot.position.y = currentFloor;
            }

            // --- Skeletal Arm Animations Keyframing ---
            if (isGrinding) {
                // Flail outward left/right to balance
                leftArmRoot.rotation.z = -Math.PI / 2 + Math.sin(Date.now() * 0.01) * 0.2;
                rightArmRoot.rotation.z = Math.PI / 2 + Math.cos(Date.now() * 0.01) * 0.2;
            } else if (!isGrounded) {
                // Raise hands straight up into high velocity tuck jump
                leftArmRoot.rotation.z = -Math.PI + 0.3;
                rightArmRoot.rotation.z = Math.PI - 0.3;
            } else {
                // Standard cruise hang casual posture swing arm pace
                leftArmRoot.rotation.z = -0.1 + Math.sin(speed * Date.now() * 0.02) * 0.1;
                rightArmRoot.rotation.z = 0.1 - Math.sin(speed * Date.now() * 0.02) * 0.1;
            }

            // --- Third-Person Camera Placement Tracking ---
            const cameraTargetOffset = new THREE.Vector3(0, 5, -10);
            const worldCamOffset = cameraTargetOffset.applyMatrix4(skaterRoot.matrixWorld);
            camera.position.lerp(worldCamOffset, 0.12);
            camera.lookAt(new THREE.Vector3(skaterRoot.position.x, skaterRoot.position.y + 1.2, skaterRoot.position.z));

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
