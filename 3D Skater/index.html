<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Nick's Skatepark - HTML5 Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #scoreBoard {
            position: absolute; top: 20px; left: 20px;
            color: cyan; font-family: 'Courier New', monospace; font-size: 24px;
            text-shadow: 2px 2px 0px #000; pointer-events: none;
        }
        #specialMeter {
            position: absolute; top: 60px; left: 20px;
            width: 200px; height: 10px; border: 2px solid cyan;
            background: #222; overflow: hidden;
        }
        #specialMeterBar { width: 0%; height: 100%; background: lime; }
        #timer {
            position: absolute; top: 20px; right: 20px;
            color: tomato; font-family: 'Courier New', monospace; font-size: 48px;
            text-shadow: 2px 2px 0px #000; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="scoreBoard">SCORE: 0</div>
    <div id="specialMeter"><div id="specialMeterBar"></div></div>
    <div id="timer">2:00</div>
    <canvas id="renderCanvas"></canvas>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/cannon.js"></script>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        let score = 0;
        let specialVal = 0;
        let timerSeconds = 120;
        const scoreBoard = document.getElementById("scoreBoard");
        const specialMeterBar = document.getElementById("specialMeterBar");
        const timerBoard = document.getElementById("timer");

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), new BABYLON.CannonJSPlugin());
            scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
            scene.fogColor = new BABYLON.Color3(0.8, 0.9, 1.0);
            scene.fogDensity = 0.01;

            // Camera: Setup to follow the skater
            const camera = new BABYLON.FollowCamera("followCam", new BABYLON.Vector3(0, 5, -10), scene);
            camera.radius = 8; camera.heightOffset = 4; camera.rotationOffset = 180;
            camera.cameraAcceleration = 0.05; camera.maxCameraSpeed = 20;

            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.7;

            // --- Textures ---
            // Concrete Ground
            const concreteTex = new BABYLON.Texture("https://www.babylonjs-playground.com/textures/concrete.png", scene);
            concreteTex.uScale = 20; concreteTex.vScale = 20;
            const concreteMat = new BABYLON.StandardMaterial("concreteMat", scene);
            concreteMat.diffuseTexture = concreteTex;
            concreteMat.specularColor = new BABYLON.Color3(0.1, 0.1, 0.1);

            // Red Roof Tiles (for outer boundary)
            const roofTex = new BABYLON.Texture("https://www.babylonjs-playground.com/textures/roof.jpg", scene);
            roofTex.uScale = 10; roofTex.vScale = 10;
            const roofMat = new BABYLON.StandardMaterial("roofMat", scene);
            roofMat.diffuseTexture = roofTex;

            // Green Ramp Material
            const rampMat = new BABYLON.StandardMaterial("rampMat", scene);
            rampMat.diffuseColor = new BABYLON.Color3(0.3, 0.5, 0.3);

            // Chain Link Fence
            const fenceTex = new BABYLON.Texture("https://www.babylonjs-playground.com/textures/player_text.png", scene); // Placeholder for chain link
            fenceTex.hasAlpha = true;
            const fenceMat = new BABYLON.StandardMaterial("fenceMat", scene);
            fenceMat.diffuseTexture = fenceTex;
            fenceMat.backFaceCulling = false;

            // --- Environment ---
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 100, height: 100}, scene);
            ground.material = concreteMat;
            ground.physicsImpostor = new BABYLON.PhysicsImpostor(ground, BABYLON.PhysicsImpostor.BoxImpostor, { mass: 0, friction: 0.5, restitution: 0.1 }, scene);

            const building = BABYLON.MeshBuilder.CreateBox("building", {width: 20, height: 15, depth: 40}, scene);
            building.position = new BABYLON.Vector3(40, 7.5, 0);
            building.material = roofMat;
            building.physicsImpostor = new BABYLON.PhysicsImpostor(building, BABYLON.PhysicsImpostor.BoxImpostor, { mass: 0 }, scene);

            // Big Nick's Sign
            const signPlane = BABYLON.MeshBuilder.CreatePlane("sign", {width: 12, height: 4}, scene);
            signPlane.position = new BABYLON.Vector3(40, 15, -15);
            signPlane.rotation.y = Math.PI / 2;
            const signMat = new BABYLON.StandardMaterial("signMat", scene);
            const dynamicTex = new BABYLON.DynamicTexture("dynamicTex", {width: 512, height: 128}, scene);
            signMat.diffuseTexture = dynamicTex;
            dynamicTex.drawText("BIG NICK'S SKATEPARK", 20, 80, "bold 44px Courier New", "blue", "white", true, true);
            signPlane.material = signMat;

            // Fence around perimeter
            const fencePositions = [
                {p: [0, 0, 50], r: [0, 0, 0]}, {p: [0, 0, -50], r: [0, 0, 0]},
                {p: [50, 0, 0], r: [0, Math.PI / 2, 0]}, {p: [-50, 0, 0], r: [0, Math.PI / 2, 0]}
            ];
            fencePositions.forEach(pos => {
                const fence = BABYLON.MeshBuilder.CreatePlane("fence", {width: 100, height: 6}, scene);
                fence.position = new BABYLON.Vector3(...pos.p); fence.rotation = new BABYLON.Vector3(...pos.r);
                fence.material = fenceMat;
            });

            // --- Obstacles ---
            const createRamp = (name, x, z, ry, sx, sy) => {
                const ramp = BABYLON.MeshBuilder.CreateBox(name, {width: 4, height: 0.2, depth: 8}, scene);
                ramp.position = new BABYLON.Vector3(x, 1, z); ramp.rotation.y = ry;
                ramp.rotation.x = -0.3; // Angle the ramp
                ramp.scaling = new BABYLON.Vector3(sx, sy, 1);
                ramp.material = rampMat;
                ramp.physicsImpostor = new BABYLON.PhysicsImpostor(ramp, BABYLON.PhysicsImpostor.BoxImpostor, { mass: 0, friction: 0.1 }, scene);
            };

            // Various Ramps
            createRamp("rampLargeL", -20, 20, 0, 2, 1); createRamp("rampLargeR", 20, 20, 0, 2, 1);
            createRamp("rampSmall1", 0, 30, Math.PI / 4, 1, 0.5); createRamp("rampSmall2", -10, -20, -Math.PI / 3, 1, 0.5);

            // Grinding Obstacles
            const createLedge = (name, x, z, w) => {
                const ledge = BABYLON.MeshBuilder.CreateBox(name, {width: w, height: 1, depth: 2}, scene);
                ledge.position = new BABYLON.Vector3(x, 0.5, z); ledge.material = rampMat;
                ledge.physicsImpostor = new BABYLON.PhysicsImpostor(ledge, BABYLON.PhysicsImpostor.BoxImpostor, { mass: 0 }, scene);
            };
            createLedge("ledgeLong", -30, -10, 20); createLedge("ledgeShort", 10, -15, 8);

            const createRail = (name, x, z, ry, length) => {
                const rail = BABYLON.MeshBuilder.CreateCylinder(name, {diameter: 0.2, height: length}, scene);
                rail.position = new BABYLON.Vector3(x, 0.6, z); rail.rotation.x = Math.PI / 2; rail.rotation.y = ry;
                rail.material = concreteMat; // Shiny metal placeholder
                rail.physicsImpostor = new BABYLON.PhysicsImpostor(rail, BABYLON.PhysicsImpostor.CylinderImpostor, { mass: 0 }, scene);
            };
            createRail("rail1", -15, 15, Math.PI / 6, 15); createRail("rail2", 5, 5, -Math.PI / 4, 10);

            // --- Player ---
            const skaterRoot = new BABYLON.Mesh("skaterRoot", scene);
            skaterRoot.position.y = 1;

            // Skateboard
            const board = BABYLON.MeshBuilder.CreateBox("board", {width: 1, height: 0.1, depth: 3}, scene);
            board.parent = skaterRoot; board.material = rampMat;

            // Wheels (rounded)
            const wheelMat = new BABYLON.StandardMaterial("wheelMat", scene); wheelMat.diffuseColor = new BABYLON.Color3(0, 1, 0);
            [[ -0.4, 1.2 ], [ 0.4, 1.2 ], [ -0.4, -1.2 ], [ 0.4, -1.2 ]].forEach(pos => {
                const wheel = BABYLON.MeshBuilder.CreateCylinder("wheel", {diameter: 0.3, height: 0.2, tessellation: 12}, scene);
                wheel.parent = board; wheel.position = new BABYLON.Vector3(pos[0], -0.2, pos[1]); wheel.rotation.z = Math.PI / 2;
                wheel.material = wheelMat;
            });

            // Character
            const character = BABYLON.MeshBuilder.CreateBox("char", {width: 0.8, height: 2, depth: 0.5}, scene);
            character.parent = skaterRoot; character.position.y = 1.1; character.material = rampMat; // Placeholder blue shirt
            
            // Baseball Cap
            const capMat = new BABYLON.StandardMaterial("capMat", scene); capMat.diffuseColor = BABYLON.Color3.White();
            const cap = BABYLON.MeshBuilder.CreateCylinder("cap", {diameter: 0.6, height: 0.4, tessellation: 16}, scene);
            cap.parent = character; cap.position.y = 1.1; cap.position.z = -0.1; // Backward
            cap.material = capMat;
            
            // Brown Hair
            const hairMat = new BABYLON.StandardMaterial("hairMat", scene); hairMat.diffuseColor = new BABYLON.Color3(0.5, 0.3, 0.1);
            const hair = BABYLON.MeshBuilder.CreateBox("hair", {width: 0.7, height: 0.3, depth: 0.5}, scene);
            hair.parent = character; hair.position.y = 0.9;
            hair.material = hairMat;

            skaterRoot.physicsImpostor = new BABYLON.PhysicsImpostor(skaterRoot, BABYLON.PhysicsImpostor.BoxImpostor, { mass: 5, friction: 0.1, restitution: 0.01 }, scene);
            camera.lockedTarget = skaterRoot;

            // PS1 Post-Processing
            const pipeline = new BABYLON.DefaultRenderingPipeline("default", true, scene, [camera]);
            pipeline.fxaaEnabled = false; // Disable smooth edges
            pipeline.bloomEnabled = false; // Disable modern glow
            pipeline.chromaticAberrationEnabled = true;
            pipeline.chromaticAberration.aberrationAmount = 2; // Slight color separation
            pipeline.grainEnabled = true; pipeline.grain.intensity = 15; // Low res noise

            return scene;
        };

        const scene = createScene();

        // Game State and Input
        let inputMap = {};
        scene.actionManager = new BABYLON.ActionManager(scene);
        scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, function (evt) { inputMap[evt.sourceEvent.key] = true; }));
        scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, function (evt) { inputMap[evt.sourceEvent.key] = false; }));

        let isGrounded = true;
        let groundRay = new BABYLON.Ray();
        let rayHelper = new BABYLON.RayHelper(groundRay);

        engine.runRenderLoop(function () {
            const skaterRoot = scene.getMeshByName("skaterRoot");
            const speed = 10;
            const turnSpeed = 2;

            // Basic movement
            if (inputMap["w"] || inputMap["ArrowUp"]) skaterRoot.physicsImpostor.applyImpulse(skaterRoot.forward.scale(speed), skaterRoot.getAbsolutePosition());
            if (inputMap["s"] || inputMap["ArrowDown"]) skaterRoot.physicsImpostor.applyImpulse(skaterRoot.forward.scale(-speed), skaterRoot.getAbsolutePosition());
            if (inputMap["a"] || inputMap["ArrowLeft"]) skaterRoot.rotate(BABYLON.Vector3.Up(), -turnSpeed * engine.getDeltaTime() / 1000, BABYLON.Space.LOCAL);
            if (inputMap["d"] || inputMap["ArrowRight"]) skaterRoot.rotate(BABYLON.Vector3.Up(), turnSpeed * engine.getDeltaTime() / 1000, BABYLON.Space.LOCAL);

            // Simple ground check for Ollie
            groundRay.origin = skaterRoot.position.add(new BABYLON.Vector3(0, 0.1, 0));
            groundRay.direction = new BABYLON.Vector3(0, -1, 0);
            groundRay.length = 0.5;
            let hit = scene.pickWithRay(groundRay, function(mesh) { return mesh.name === "ground" || mesh.name.includes("ramp") || mesh.name.includes("ledge"); });
            isGrounded = hit.hit;

            // Ollie (Spacebar)
            if ((inputMap[" "] && isGrounded)) {
                skaterRoot.physicsImpostor.applyImpulse(new BABYLON.Vector3(0, 50, 0), skaterRoot.getAbsolutePosition());
                score += 50; specialVal = Math.min(100, specialVal + 10);
            }

            // HUD and Game Logic
            scoreBoard.innerText = "SCORE: " + score;
            specialMeterBar.style.width = specialVal + "%";
            
            // Timer
            timerSeconds -= engine.getDeltaTime() / 1000;
            if (timerSeconds <= 0) {
                // Game over logic here
                timerBoard.innerText = "0:00"; engine.stopRenderLoop(); alert("GAME OVER! Score: " + score);
            } else {
                let mins = Math.floor(timerSeconds / 60);
                let secs = Math.floor(timerSeconds % 60);
                timerBoard.innerText = mins + ":" + secs.toString().padStart(2, '0');
            }

            // Keep character upright
            let currentRotation = skaterRoot.rotationQuaternion.toEulerAngles();
            currentRotation.x = 0; currentRotation.z = 0;
            skaterRoot.rotationQuaternion = BABYLON.Quaternion.FromEulerVector(currentRotation);

            scene.render();
        });

        window.addEventListener("resize", function () { engine.resize(); });
    </script>
</body>
</html>
