<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Pro Skater (THPS Style)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            background-color: #888;
        }
        canvas {
            display: block;
        }

        /* --- HUD Elements based on the image --- */
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: #fff;
            text-shadow: 2px 2px #000;
            pointer-events: none;
            box-sizing: border-box;
        }

        /* Top-Left: Score and Special Meter */
        #top-left-hud {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        #score-label, #score-value {
            font-size: 24px;
            text-transform: uppercase;
        }
        #score-value {
            color: #ff0;
            font-weight: bold;
        }
        #special-bar-container {
            width: 200px;
            height: 15px;
            border: 3px solid #666;
            background-color: #333;
            margin-top: 5px;
            position: relative;
        }
        #special-bar-fill {
            height: 100%;
            background-color: #0f0;
            width: 40%; /* Start partially filled */
            box-shadow: 0 0 10px #0f0;
        }
        #special-text {
            position: absolute;
            top: -2px;
            left: 5px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }

        /* Top-Right: Timer */
        #top-right-hud {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 36px;
            color: #f33;
            font-weight: bold;
        }

        /* Bottom-Center: Trick Combo and Score */
        #bottom-center-hud {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
        }
        #trick-text {
            font-size: 24px;
            margin-bottom: 5px;
            color: #fff;
            font-weight: bold;
        }
        #combo-score {
            font-size: 20px;
            color: #ff0;
        }
        #multiplier {
            color: #fff;
        }

        #controls-guide {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #ccc;
            font-size: 12px;
            text-align: right;
            text-shadow: 1px 1px #000;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="top-left-hud">
            <div id="score-label">SCORE</div>
            <div id="score-value">2971</div>
            <div id="special-bar-container">
                <div id="special-bar-fill"></div>
                <span id="special-text">SPECIAL</span>
            </div>
        </div>

        <div id="top-right-hud">1:39</div>

        <div id="bottom-center-hud">
            <div id="trick-text">BS OVERCROOK + POP SHOVE IT</div>
            <div id="combo-score">1097 <span id="multiplier">X2</span></div>
        </div>
    </div>

    <div id="controls-guide">
        WASD / Arrows: Steer | Spacebar: Ollie (Jump) | W / I Key: Hold to Grind Ledges
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/build/three.min.js"></script>

    <script>
        // --- 3D Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xdcdcdc, 0.015); 
        scene.background = new THREE.Color(0xdcdcdc); // Atmospheric haze/sky from picture

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Nostalgic pixelated edges
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfff8e7, 1.0); // Warm sunlight
        sunLight.position.set(30, 40, 20);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        scene.add(sunLight);

        // --- Environment (Rooftop Ground) ---
        // Replacing image texture with built-in procedural tile colors
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0xa27a64 }); // Terracotta brown/red roof color from image
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Buildings & Ledges (Built out of safe materials) ---
        function createLedge(w, h, d, x, z, color=0x707070) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshLambertMaterial({ color: color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, h/2, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            // Shiny metal coping edge for grinding
            const railGeo = new THREE.BoxGeometry(w + 0.1, 0.1, 0.2);
            const railMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.2, metalness: 0.8 });
            const rail = new THREE.Mesh(railGeo, railMat);
            rail.position.set(0, h/2, d/2);
            mesh.add(rail);

            scene.add(mesh);
            return mesh;
        }

        // Recreating the layout in your school picture
        const leftGrindBox = createLedge(12, 1.2, 3, -10, -15, 0x3d6346); // Green container boxes on left
        const leftGrindBox2 = createLedge(12, 1.2, 3, -12, -5, 0x3d6346);
        
        // Large background brick building structure
        const backBuildingGeo = new THREE.BoxGeometry(60, 40, 40);
        const backBuildingMat = new THREE.MeshLambertMaterial({ color: 0x8a7364 }); // Brick tone tint
        const backBuilding = new THREE.Mesh(backBuildingGeo, backBuildingMat);
        backBuilding.position.set(40, 20, -35);
        backBuilding.castShadow = true;
        scene.add(backBuilding);

        // --- Procedural Player Skater Model (No files required!) ---
        const skaterGroup = new THREE.Group();

        // Skateboard deck
        const deckGeo = new THREE.BoxGeometry(1.2, 0.1, 3.2);
        const deckMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
        const deck = new THREE.Mesh(deckGeo, deckMat);
        deck.position.y = 0.2;
        deck.castShadow = true;
        skaterGroup.add(deck);

        // Human Torso (Shirt)
        const torsoGeo = new THREE.BoxGeometry(1.0, 1.6, 0.6);
        const torsoMat = new THREE.MeshLambertMaterial({ color: 0x2b4275 }); // Dark blue shirt from image
        const torso = new THREE.Mesh(torsoGeo, torsoMat);
        torso.position.set(0, 2.2, 0);
        torso.castShadow = true;
        skaterGroup.add(torso);

        // Pants (Crouching stance)
        const pantsGeo = new THREE.BoxGeometry(0.9, 1.0, 0.7);
        const pantsMat = new THREE.MeshLambertMaterial({ color: 0x756753 }); // Cargo shorts tan from image
        const pants = new THREE.Mesh(pantsGeo, pantsMat);
        pants.position.set(0, 1.2, 0);
        skaterGroup.add(pants);

        // Head
        const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const headMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.set(0, 3.2, 0);
        skaterGroup.add(head);

        // Left Outstretched Arm (Balancing pose just like the photo!)
        const armGeo = new THREE.BoxGeometry(1.4, 0.3, 0.3);
        const armMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 });
        const leftArm = new THREE.Mesh(armGeo, armMat);
        leftArm.position.set(-1.0, 2.5, 0);
        skaterGroup.add(leftArm);

        skaterGroup.position.set(0, 0, 10);
        scene.add(skaterGroup);

        // Player Movement State variables
        let speed = 0;
        let rotation = Math.PI; // Face forward down screen
        let jumpVelocity = 0;
        let isGrounded = true;
        let isGrinding = false;

        // --- Controls Keyboard System ---
        const keys = { w: false, a: false, s: false, d: false, space: false };

        window.addEventListener('keydown', e => {
            if(e.key === 'w' || e.key === 'ArrowUp') keys.w = true;
            if(e.key === 'a' || e.key === 'ArrowLeft') keys.a = true;
            if(e.key === 's' || e.key === 'ArrowDown') keys.s = true;
            if(e.key === 'd' || e.key === 'ArrowRight') keys.d = true;
            if(e.key === ' ') keys.space = true;
        });

        window.addEventListener('keyup', e => {
            if(e.key === 'w' || e.key === 'ArrowUp') keys.w = false;
            if(e.key === 'a' || e.key === 'ArrowLeft') keys.a = false;
            if(e.key === 's' || e.key === 'ArrowDown') keys.s = false;
            if(e.key === 'd' || e.key === 'ArrowRight') keys.d = false;
            if(e.key === ' ') keys.space = false;
        });

        // --- Main Engine Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Handle Turning and Acceleration
            if (keys.a) rotation += 0.04;
            if (keys.d) rotation -= 0.04;
            skaterGroup.rotation.y = rotation;

            if (keys.w) speed += (0.35 - speed) * 0.05;
            else if (keys.s) speed += (-0.2 - speed) * 0.05;
            else speed *= 0.96; // Friction decay

            // Vector math translations
            skaterGroup.position.x += speed * Math.sin(rotation);
            skaterGroup.position.z += speed * Math.cos(rotation);

            // Physics Gravity System (Jumping / Ollie)
            if (keys.space && isGrounded) {
                jumpVelocity = 0.28;
                isGrounded = false;
                isGrinding = false;
            }

            if (!isGrounded) {
                jumpVelocity -= 0.012; // Gravity pull down
                skaterGroup.position.y += jumpVelocity;

                // Land back onto the roof deck
                if (skaterGroup.position.y <= 0) {
                    skaterGroup.position.y = 0;
                    jumpVelocity = 0;
                    isGrounded = true;
                }
            }

            // --- Basic Interaction check for Grinding green boxes ---
            if (!isGrinding) {
                let pPos = skaterGroup.position;
                if (Math.abs(pPos.x - leftGrindBox.position.x) < 3 && Math.abs(pPos.z - leftGrindBox.position.z) < 6) {
                    // If near the box and mid-air/dropping onto it
                    if (skaterGroup.position.y > 0 && skaterGroup.position.y < 1.5) {
                        isGrinding = true;
                        isGrounded = true;
                        skaterGroup.position.y = 1.2; // Snap perfectly onto the box level
                    }
                }
            } else {
                // Drop off the back edge of the ledge box manually or naturally
                if (Math.abs(skaterGroup.position.x - leftGrindBox.position.x) > 3.5 || Math.abs(skaterGroup.position.z - leftGrindBox.position.z) > 6.5) {
                    isGrinding = false;
                    isGrounded = false;
                }
            }

            // --- Over-The-Shoulder Camera following like picture ---
            const relativeCameraOffset = new THREE.Vector3(0, 4.5, -9); // Height and distance behind character
            const cameraOffset = relativeCameraOffset.applyMatrix4(skaterGroup.matrixWorld);
            camera.position.x = cameraOffset.x;
            camera.position.y = cameraOffset.y;
            camera.position.z = cameraOffset.z;
            
            // Camera tracks looking straight down past the rider's chest
            camera.lookAt(new THREE.Vector3(skaterGroup.position.x, skaterGroup.position.y + 1.5, skaterGroup.position.z));

            renderer.render(scene, camera);
        }

        // Window resize compliance hook
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
