<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    
    <title>Nickcraft - Survival Sandbox</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #87CEEB; user-select: none; -webkit-user-select: none; touch-action: none; }
        
        /* Centered Bold Green Title Layout - Large Font Sizes */
        #ui-header { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; z-index: 10; width: 100%; }
        #ui-header h1 { margin: 0; font-size: 35px; letter-spacing: 1.5px; font-weight: 900; color: #22c55e; text-shadow: 2px 2px 4px rgba(0,0,0,0.85); text-transform: uppercase; }
        #ui-header p { margin: 6px 0 0 0; font-size: 16px; color: white; text-shadow: 1px 1px 2px black; opacity: 0.9; font-weight: bold; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; background: white; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; mix-blend-mode: difference; }
        
        /* Hotbar Visuals */
        #menu { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(30,30,30,0.85); padding: 6px; border: 4px solid #4a4a4a; border-radius: 4px; display: flex; gap: 6px; z-index: 20; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .hotbar-slot { width: 54px; height: 54px; color: white; border: 3px solid #2c2c2c; border-radius: 4px; font-weight: bold; font-size: 11px; text-shadow: 1px 1px 2px black; cursor: pointer; display: flex; align-items: center; justify-content: center; text-transform: uppercase; transition: all 0.1s ease; }
        .slot-grass { background: #557a2b; }
        .slot-dirt { background: #866043; }
        .slot-stone { background: #737373; }
        .slot-wood { background: #f97316; } 
        .slot-action { background: #0284c7; width: auto; padding: 0 12px; font-size: 12px; }
        .hotbar-slot.active-slot { border-color: #ffffff; transform: scale(1.05); box-shadow: 0 0 12px rgba(255,255,255,0.6); }
        
        .touch-zone { position: absolute; z-index: 15; }
        
        /* Square Mobile D-Pad */
        #dpad-container { bottom: 60px; left: 35px; width: 252px; height: 252px; display: grid; grid-template-columns: repeat(3, 84px); grid-template-rows: repeat(3, 84px); background: transparent; }
        .dpad-btn { width: 80px; height: 80px; background: rgba(115, 122, 110, 0.75); border: 5px solid #282c24; border-bottom-width: 8px; border-radius: 0px; box-shadow: inset 0px 4px 0px rgba(255,255,255,0.2), 0px 5px 8px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        .dpad-btn:active { background: rgba(75, 80, 70, 0.9); border-bottom-width: 5px; transform: translateY(3px); box-shadow: inset 0px 2px 4px rgba(0,0,0,0.4); }
        
        /* Pixelated Arrow Shapes */
        .dpad-arrow { width: 0; height: 0; border-style: solid; opacity: 0.9; }
        #dpad-up .dpad-arrow { border-width: 0 18px 22px 18px; border-color: transparent transparent #161a13 transparent; }
        #dpad-left .dpad-arrow { border-width: 18px 22px 18px 0; border-color: transparent #161a13 transparent transparent; }
        #dpad-right .dpad-arrow { border-width: 18px 0 18px 22px; border-color: transparent transparent transparent #161a13; }
        #dpad-down .dpad-arrow { border-width: 22px 18px 0 18px; border-color: #161a13 transparent transparent transparent; }
        
        #dpad-up { grid-column: 2; grid-row: 1; }
        #dpad-left { grid-column: 1; grid-row: 2; }
        #dpad-right { grid-column: 3; grid-row: 2; }
        #dpad-down { grid-column: 2; grid-row: 3; }
        
        /* Action Column Layout */
        #right-action-column { position: absolute; bottom: 35px; right: 35px; width: 110px; display: flex; flex-direction: column; align-items: center; gap: 14px; z-index: 15; }
        
        #jump-pad { width: 96px; height: 96px; background: rgba(2, 132, 199, 0.8); border: 4px solid #ffffff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 16px; text-shadow: 1px 1px 2px black; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.35); }
        #jump-pad:active { background: rgba(3, 105, 161, 0.9); transform: scale(0.94); box-shadow: 0 3px 6px rgba(0,0,0,0.2); }
        
        .action-column-btn { width: 106px; height: 80px; border: 3px solid white; color: white; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.3); text-shadow: 1px 1px 2px black; }
        #mb-place { background: rgba(56, 161, 105, 0.85); }
        #mb-break { background: rgba(229, 62, 62, 0.85); }
    </style>
</head>
<body>

    <div id="ui-header">
        <h1>Nickcraft</h1>
        <p>Axe Hunt Animals & Zombies | Hold JUMP to Swim in Pools</p>
    </div>
    
    <div id="crosshair"></div>

    <div id="dpad-container" class="touch-zone">
        <div class="dpad-btn" id="dpad-up"><div class="dpad-arrow"></div></div>
        <div class="dpad-btn" id="dpad-left"><div class="dpad-arrow"></div></div>
        <div></div> <div class="dpad-btn" id="dpad-right"><div class="dpad-arrow"></div></div>
        <div class="dpad-btn" id="dpad-down"><div class="dpad-arrow"></div></div>
    </div>
    
    <div id="right-action-column">
        <div id="jump-pad">JUMP</div>
        <div class="action-column-btn" id="mb-place">PLACE</div>
        <div class="action-column-btn" id="mb-break">BREAK</div>
    </div>

    <div id="menu">
        <div id="slot-grass" class="hotbar-slot slot-grass active-slot" onclick="selectSlot('grass')">Grass</div>
        <div id="slot-dirt" class="hotbar-slot slot-dirt" onclick="selectSlot('dirt')">Dirt</div>
        <div id="slot-stone" class="hotbar-slot slot-stone" onclick="selectSlot('stone')">Stone</div>
        <div id="slot-wood" class="hotbar-slot slot-wood" onclick="selectSlot('wood')">Wood</div>
        <div class="hotbar-slot slot-action" onclick="saveWorld()">Save</div>
        <div class="hotbar-slot slot-action" onclick="loadWorld()">Load</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
