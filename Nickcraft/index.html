<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nickcraft - Mobile Voxel Sandbox</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #87CEEB; user-select: none; -webkit-user-select: none; touch-action: none; }
        #ui { position: absolute; top: 12px; left: 12px; color: white; text-shadow: 1px 1px 2px black; pointer-events: none; z-index: 10; }
        #ui h1 { margin: 0; font-size: 22px; }
        #ui p { margin: 4px 0; font-size: 14px; opacity: 0.9; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: white; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; mix-blend-mode: difference; }
        
        /* Large, Thumb-Friendly Hotbar */
        #menu { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; display: flex; gap: 8px; z-index: 20; max-width: 95vw; }
        button { padding: 12px 16px; background: #4CAF50; color: white; border: none; font-line: none; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .wood-btn { background: #b45309; }
        .save-btn { background: #008CBA; }

        /* Huge Mobile Touch Buttons */
        .touch-zone { position: absolute; z-index: 15; display: flex; align-items: center; justify-content: center; }
        
        /* Left giant movement pad */
        #move-pad { bottom: 100px; left: 25px; width: 130px; height: 130px; background: rgba(255,255,255,0.25); border: 3px dashed rgba(255,255,255,0.5); border-radius: 50%; color: white; font-weight: bold; font-size: 16px; }
        
        /* Right giant action pads */
        #action-pad { bottom: 100px; right: 25px; width: 110px; height: 180px; flex-direction: column; gap: 15px; }
        .mobile-btn { width: 100%; height: 80px; background: rgba(0,0,0,0.6); border: 3px solid white; color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        #mb-place { background: rgba(76, 175, 80, 0.6); }
        #mb-break { background: rgba(244, 67, 54, 0.6); }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Nickcraft Mobile</h1>
        <p>Swipe sky to look around (Inverted) | Use huge buttons to play</p>
    </div>
    
    <div id="crosshair"></div>

    <div id="move-pad" class="touch-zone"><span>MOVE</span></div>
    <div id="action-pad" class="touch-zone">
        <div class="mobile-btn" id="mb-place">PLACE</div>
        <div class="mobile-btn" id="mb-break">BREAK</div>
    </div>

    <div id="menu">
        <button onclick="setBlockType('grass')">Grass</button>
        <button onclick="setBlockType('dirt')">Dirt</button>
        <button onclick="setBlockType('stone')">Stone</button>
        <button class="wood-btn" onclick="setBlockType('wood')">Wood</button>
        <button class="save-btn" onclick="saveWorld()">Save</button>
        <button class="save-btn" onclick="loadWorld()">Load</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
