<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nickcraft - 80x80 Survival Sandbox</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #87CEEB; user-select: none; -webkit-user-select: none; touch-action: none; }
        
        /* Crisp HTML branding overlay replacing heavy sky geometry */
        #ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); text-align: center; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 10; width: 100%; }
        #ui h1 { margin: 0; font-size: 36px; letter-spacing: 3px; font-weight: 900; color: #facc15; -webkit-text-stroke: 1px black; }
        #ui p { margin: 4px 0; font-size: 12px; opacity: 0.9; font-weight: bold; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; background: white; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; mix-blend-mode: difference; }
        
        /* Creative Inventory Quick Tray */
        #menu { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(20,20,20,0.9); padding: 5px; border: 3px solid #4a4a4a; border-radius: 4px; display: flex; gap: 6px; z-index: 20; }
        .hotbar-slot { width: 48px; height: 48px; color: white; border: 3px solid #2c2c2c; border-radius: 4px; font-weight: bold; font-size: 10px; text-shadow: 1px 1px 2px black; cursor: pointer; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .slot-grass { background: #557a2b; }
        .slot-dirt { background: #866043; }
        .slot-stone { background: #737373; }
        .slot-wood { background: #f97316; } 
        .slot-action { background: #0284c7; width: auto; padding: 0 10px; font-size: 11px; }
        .hotbar-slot.active-slot { border-color: #ffffff; transform: scale(1.05); }
        
        .touch-zone { position: absolute; z-index: 15; }
        
        /* Ergonomic Centerless Square D-Pad Grid */
        #dpad-container { bottom: 35px; left: 35px; width: 252px; height: 252px; display: grid; grid-template-columns: repeat(3, 84px); grid-template-rows: repeat(3, 84px); background: transparent; }
        .dpad-btn { width: 80px; height: 80px; background: rgba(115, 122, 110, 0.75); border: 5px solid #282c24; border-bottom-width: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .dpad-btn:active { background: rgba(75, 80, 70, 0.9); border-bottom-width: 5px; transform: translateY(3px); }
        
        .dpad-arrow { width: 0; height: 0; border-style: solid; opacity: 0.9; }
        #dpad-up .dpad-arrow { border-width: 0 18px 22px 18px; border-color: transparent transparent #161a13 transparent; }
        #dpad-left .dpad-arrow { border-width: 18px 22px 18px 0; border-color: transparent #161a13 transparent transparent; }
        #dpad-right .dpad-arrow { border-width: 18px 0 18px 22px; border-color: transparent transparent transparent #161a13; }
        #dpad-down .dpad-arrow { border-width: 22px 18px 0 18px; border-color: #161a13 transparent transparent transparent; }
        
        #dpad-up { grid-column: 2; grid-row: 1; }
        #dpad-left { grid-column: 1; grid-row: 2; }
        #dpad-right { grid-column: 3; grid-row: 2; }
        #dpad-down { grid-column: 2; grid-row: 3; }
        
        /* Action Button Column Stack Layout */
        #right-action-column { position: absolute; bottom: 35px; right: 35px; width: 100px; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 15; }
        
        /* Circular Ergonomic Jump Input Button placed right above Place button */
        #jump-pad { width: 84px; height: 84px; background: rgba(2, 132, 199, 0.85); border: 4px solid #ffffff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 15px; text-shadow: 1px 1px 2px black; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        #jump-pad:active { background: rgba(3, 105, 161, 0.95); transform: scale(0.95); }
        
        .action-column-btn { width: 94px; height: 70px; border: 3px solid white; color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; cursor: pointer; text-shadow: 1px 1px 2px black; box-shadow: 0 4px 8px rgba(0,0,0,0.25); }
        #mb-place { background: rgba(56, 161, 105, 0.85); }
        #mb-break { background: rgba(229, 62, 62, 0.85); }
    </style>
</head>
<body>

    <div id="ui">
        <h1>NICKCRAFT</h1>
        <p>Zombies flee firepits | Double-Tap Up to Sprint</p>
    </div>
    
    <div id="crosshair"></div>

    <div id="dpad-container" class="touch-zone">
        <div class="dpad-btn" id="dpad-up"><div class="dpad-arrow"></div></div>
        <div class="dpad-btn" id="dpad-left"><div class="dpad-arrow"></div></div>
        <div></div>
        <div class="dpad-btn" id="dpad-right"><div class="dpad-arrow"></div></div>
        <div class="dpad-btn" id="dpad-down"><div class="dpad-arrow"></div></div>
    </div>
    
    <div id="right-action-column">
        <div id="jump-pad">JUMP</div>
        <div class="action-column-btn" id="mb-place">PLACE</div>
        <div class="action-column-btn" id="mb-break">BREAK</div>
    </div>

    <div id="menu">
        <div id="slot-grass" class="hotbar-slot slot-grass active-slot" onclick="selectSlot('grass')">Grass</div>
        <div id="slot-dirt" class="hotbar-slot slot-dirt" onclick="selectSlot('dirt')">Dirt</div>
        <div id="slot-stone" class="hotbar-slot slot-stone" onclick="selectSlot('stone')">Stone</div>
        <div id="slot-wood" class="hotbar-slot slot-wood" onclick="selectSlot('wood')">Wood</div>
        <div class="hotbar-slot slot-action" onclick="saveWorld()">Save</div>
        <div class="hotbar-slot slot-action" onclick="loadWorld()">Load</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
