<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nickcraft - Fire & Glow Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #87CEEB; user-select: none; -webkit-user-select: none; touch-action: none; }
        #ui { position: absolute; top: 12px; left: 12px; color: white; text-shadow: 1px 1px 2px black; pointer-events: none; z-index: 10; }
        #ui h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        #ui p { margin: 4px 0; font-size: 13px; opacity: 0.85; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; background: white; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; mix-blend-mode: difference; }
        
        /* Graphic Inventory Hotbar Visuals */
        #menu { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(30,30,30,0.85); padding: 6px; border: 4px solid #4a4a4a; border-radius: 4px; display: flex; gap: 6px; z-index: 20; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .hotbar-slot { width: 54px; height: 54px; color: white; border: 3px solid #2c2c2c; border-radius: 4px; font-weight: bold; font-size: 11px; text-shadow: 1px 1px 2px black; cursor: pointer; display: flex; align-items: center; justify-content: center; text-transform: uppercase; transition: all 0.1s ease; }
        
        .slot-grass { background: #557a2b; }
        .slot-dirt { background: #866043; }
        .slot-stone { background: #737373; }
        .slot-wood { background: #f97316; } 
        .slot-action { background: #0284c7; width: auto; padding: 0 12px; font-size: 12px; }
        .hotbar-slot.active-slot { border-color: #ffffff; transform: scale(1.05); box-shadow: 0 0 12px rgba(255,255,255,0.6); }
        
        /* Unified Touch Zone Bases */
        .touch-zone { position: absolute; z-index: 15; display: flex; align-items: center; justify-content: center; }
        
        /* Open-Cross Centerless Layout matched to cant-find-the-old-dpad-i-can-only-use-the-new-one-v0-p5b2mjfl1soc1.webp */
        #dpad-container { bottom: 35px; left: 35px; width: 250px; height: 250px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 8px; background: transparent; }
        .dpad-btn { background: rgba(118, 125, 112, 0.65); border: 4px solid rgba(48, 52, 45, 0.8); border-radius: 12px; box-shadow: inset 0px 3px 0px rgba(255,255,255,0.2), 0px 5px 8px rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; transition: transform 0.05s ease; }
        
        /* Active touch tracking states */
        .dpad-btn:active { background: rgba(78, 84, 74, 0.85); border-color: rgba(30, 33, 28, 0.9); transform: scale(0.95); box-shadow: inset 0px 2px 4px rgba(0,0,0,0.4); }
        
        /* Sharp Pixel Triangle Icons inside buttons */
        .dpad-arrow { width: 0; height: 0; border-style: solid; opacity: 0.9; }
        #dpad-up .dpad-arrow { border-width: 0 18px 22px 18px; border-color: transparent transparent #21261e transparent; }
        #dpad-left .dpad-arrow { border-width: 18px 22px 18px 0; border-color: transparent #21261e transparent transparent; }
        #dpad-right .dpad-arrow { border-width: 18px 0 18px 22px; border-color: transparent transparent transparent #21261e; }
        #dpad-down .dpad-arrow { border-width: 22px 18px 0 18px; border-color: #21261e transparent transparent transparent; }
        
        /* Explicit Grid Positions (Center Column 2, Row 2 is kept intentionally empty) */
        #dpad-up { grid-column: 2; grid-row: 1; }
        #dpad-left { grid-column: 1; grid-row: 2; }
        #dpad-right { grid-column: 3; grid-row: 2; }
        #dpad-down { grid-column: 2; grid-row: 3; }
        
        /* Rounded Action Controls Layout */
        #jump-pad { bottom: 110px; left: 310px; width: 95px; height: 95px; background: rgba(255,255,255,0.15); border: 4px dashed rgba(255,255,255,0.4); border-radius: 50%; color: white; font-weight: bold; font-size: 16px; text-shadow: 1px 1px 2px black; cursor: pointer; }
        #jump-pad:active { background: rgba(255,255,255,0.3); }
        
        #action-pad { bottom: 80px; right: 20px; width: 120px; height: 210px; flex-direction: column; gap: 15px; }
        .mobile-btn { width: 100%; height: 95px; background: rgba(0,0,0,0.65); border: 3px solid white; color: white; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 19px; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.3); }
        #mb-place { background: rgba(56, 161, 105, 0.75); }
        #mb-break { background: rgba(229, 62, 62, 0.75); }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Nickcraft Worlds</h1>
        <p>Drag Canvas to Look | Clean Cross D-Pad Active</p>
    </div>
    
    <div id="crosshair"></div>

    <!-- Centerless Cross layout matching cant-find-the-old-dpad-i-can-only-use-the-new-one-v0-p5b2mjfl1soc1.webp -->
    <div id="dpad-container" class="touch-zone">
        <div class="dpad-btn" id="dpad-up"><div class="dpad-arrow"></div></div>
        <div class="dpad-btn" id="dpad-left"><div class="dpad-arrow"></div></div>
        <!-- Center coordinate is intentionally blank -->
        <div></div>
        <div class="dpad-btn" id="dpad-right"><div class="dpad-arrow"></div></div>
        <div class="dpad-btn" id="dpad-down"><div class="dpad-arrow"></div></div>
    </div>
    
    <div id="jump-pad" class="touch-zone"><span>JUMP</span></div>
    
    <div id="action-pad" class="touch-zone">
        <div class="mobile-btn" id="mb-place">PLACE</div>
        <div class="mobile-btn" id="mb-break">BREAK</div>
    </div>

    <!-- Inventory Block Selection Trays -->
    <div id="menu">
        <div id="slot-grass" class="hotbar-slot slot-grass active-slot" onclick="selectSlot('grass')">Grass</div>
        <div id="slot-dirt" class="hotbar-slot slot-dirt" onclick="selectSlot('dirt')">Dirt</div>
        <div id="slot-stone" class="hotbar-slot slot-stone" onclick="selectSlot('stone')">Stone</div>
        <div id="slot-wood" class="hotbar-slot slot-wood" onclick="selectSlot('wood')">Wood</div>
        <div class="hotbar-slot slot-action" onclick="saveWorld()">Save</div>
        <div class="hotbar-slot slot-action" onclick="loadWorld()">Load</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
