<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nickcraft - Living World Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #87CEEB; user-select: none; -webkit-user-select: none; touch-action: none; }
        #ui { position: absolute; top: 12px; left: 12px; color: white; text-shadow: 1px 1px 2px black; pointer-events: none; z-index: 10; }
        #ui h1 { margin: 0; font-size: 22px; }
        #ui p { margin: 4px 0; font-size: 14px; opacity: 0.9; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: white; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; mix-blend-mode: difference; }
        
        /* Menu styles */
        #menu { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; display: flex; gap: 8px; z-index: 20; max-width: 95vw; }
        button { padding: 12px 16px; color: white; border: 2px solid rgba(255,255,255,0.3); border-radius: 5px; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 1px black; cursor: pointer; }
        
        .btn-grass { background-color: #557a2b; }
        .btn-dirt { background-color: #866043; }
        .btn-stone { background-color: #737373; }
        .btn-wood { background-color: #f97316; } 
        .save-btn { background-color: #008CBA; }

        /* Touch Zone Bases */
        .touch-zone { position: absolute; z-index: 15; display: flex; align-items: center; justify-content: center; }
        
        /* Image Matched Large D-Pad Layout from description_879ed4f8-d4e9-4585-aa48-78a948ecc112.png */
        #dpad-container { bottom: 30px; left: 30px; width: 220px; height: 220px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 4px; background: transparent; }
        .dpad-btn { background: rgba(115, 123, 110, 0.55); border: 3px solid rgba(50, 54, 47, 0.7); border-radius: 12px; box-shadow: inset 0px 4px 4px rgba(255,255,255,0.2), 0px 4px 6px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        .dpad-btn:active { background: rgba(90, 97, 85, 0.8); }
        
        /* Arrow markers inside tiles */
        .dpad-arrow { width: 0; height: 0; border-style: solid; opacity: 0.75; }
        #dpad-up .dpad-arrow { border-width: 0 16px 20px 16px; border-color: transparent transparent #22261f transparent; }
        #dpad-left .dpad-arrow { border-width: 16px 20px 16px 0; border-color: transparent #22261f transparent transparent; }
        #dpad-right .dpad-arrow { border-width: 16px 0 16px 20px; border-color: transparent transparent transparent #22261f; }
        #dpad-down .dpad-arrow { border-width: 20px 16px 0 16px; border-color: #22261f transparent transparent transparent; }
        
        /* Center marker icon styling */
        #dpad-center { grid-column: 2; grid-row: 2; background: rgba(115, 123, 110, 0.45); border: 3px solid rgba(50, 54, 47, 0.5); box-shadow: none; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
        .center-dot { width: 14px; height: 8px; background: #22261f; opacity: 0.6; border-radius: 2px; }
        .center-line { width: 18px; height: 4px; background: #22261f; opacity: 0.6; border-radius: 1px; }

        #dpad-up { grid-column: 2; grid-row: 1; }
        #dpad-left { grid-column: 1; grid-row: 2; }
        #dpad-right { grid-column: 3; grid-row: 2; }
        #dpad-down { grid-column: 2; grid-row: 3; }
        
        /* Large Rounded Jump Pad Container */
        #jump-pad { bottom: 95px; left: 280px; width: 95px; height: 95px; background: rgba(255,255,255,0.15); border: 3px dashed rgba(255,255,255,0.5); border-radius: 50%; color: white; font-weight: bold; font-size: 16px; text-shadow: 1px 1px 2px black; cursor: pointer; }
        
        /* Action buttons placement layout styling */
        #action-pad { bottom: 80px; right: 20px; width: 110px; height: 200px; flex-direction: column; gap: 15px; }
        .mobile-btn { width: 100%; height: 90px; background: rgba(0,0,0,0.6); border: 3px solid white; color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; cursor: pointer; }
        #mb-place { background: rgba(76, 175, 80, 0.7); }
        #mb-break { background: rgba(244, 67, 54, 0.7); }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Nickcraft Mobile</h1>
        <p>Drag sky to look around | Large Accurate D-Pad Layout Active</p>
    </div>
    
    <div id="crosshair"></div>

    <!-- Redesigned Image Accurate D-Pad Interface Grid Container -->
    <div id="dpad-container" class="touch-zone">
        <div class="dpad-btn" id="dpad-up"><div class="dpad-arrow"></div></div>
        <div class="dpad-btn" id="dpad-left"><div class="dpad-arrow"></div></div>
        <div id="dpad-center"><div class="center-dot"></div><div class="center-line"></div></div>
        <div class="dpad-btn" id="dpad-right"><div class="dpad-arrow"></div></div>
        <div class="dpad-btn" id="dpad-down"><div class="dpad-arrow"></div></div>
    </div>
    
    <div id="jump-pad" class="touch-zone"><span>JUMP</span></div>
    
    <div id="action-pad" class="touch-zone">
        <div class="mobile-btn" id="mb-place">PLACE</div>
        <div class="mobile-btn" id="mb-break">BREAK</div>
    </div>

    <div id="menu">
        <button class="btn-grass" onclick="setBlockType('grass')">Grass</button>
        <button class="btn-dirt" onclick="setBlockType('dirt')">Dirt</button>
        <button class="btn-stone" onclick="setBlockType('stone')">Stone</button>
        <button class="btn-wood" onclick="setBlockType('wood')">Wood</button>
        <button class="save-btn" onclick="saveWorld()">Save</button>
        <button class="save-btn" onclick="loadWorld()">Load</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
