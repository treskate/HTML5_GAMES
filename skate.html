<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canvas Skate & Draw - Arcade Turbo Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 18px;
            border-radius: 10px;
            pointer-events: none;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            border: 1px solid #333;
            z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 18px; color: #00ffcc; text-transform: uppercase; letter-spacing: 1px; }
        p { margin: 4px 0; font-size: 13px; color: #ccc; }
        .score-display {
            font-size: 22px;
            font-weight: bold;
            color: #ffcc00;
            margin-top: 5px;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            background: #222;
        }
        
        /* Layout for Gamepad Interface */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 5%;
            right: 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        .interactive { pointer-events: auto; }

        /* Left side Directional Pad */
        .dpad { display: flex; gap: 15px; }
        .btn-dir {
            width: 65px;
            height: 65px;
            background: rgba(40, 40, 40, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-dir:active {
            background: rgba(0, 255, 204, 0.4);
            border-color: #00ffcc;
        }

        /* Right side Action Button Diamond Cluster */
        .ps-cluster {
            position: relative;
            width: 170px;
            height: 170px;
        }
        .ps-btn {
            position: absolute;
            width: 52px;
            height: 52px;
            background: #111;
            border: 3px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        
        /* Triangle (Top) */
        #btn-triangle { top: 0; left: 59px; color: #41ffb7; border-color: #1b855a; }
        #btn-triangle:active { background: rgba(65, 255, 183, 0.4); }
        
        /* Square (Left) */
        #btn-square { top: 59px; left: 0; color: #f4add5; border-color: #9c5880; font-size: 20px; }
        #btn-square:active { background: rgba(244, 173, 213, 0.4); }
        
        /* Circle - TURBO (Right) */
        #btn-circle { top: 59px; right: 0; color: #ff5500; border-color: #b32400; font-size: 14px; }
        #btn-circle:active { background: rgba(255, 85, 0, 0.4); }
        
        /* Cross (Bottom) */
        #btn-cross { bottom: 0; left: 59px; color: #8fa1f0; border-color: #3b4e9e; }
        #btn-cross:active { background: rgba(143, 161, 240, 0.4); }

        #btn-clear {
            position: absolute;
            top: 10px;
            right: 10px;
            width: auto;
            height: auto;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Arcade Sketch & Skate</h1>
        <p>▢ Kickflip (+5) | ✕ Ollie (+2) | Δ 360 (+10)</p>
        <p>◯ TURBO FIRE BOOST (+20)</p>
        <div class="score-display" id="scoreBoard">SCORE: 00000</div>
    </div>

    <button id="btn-clear" class="btn-dir interactive">Clear Track</button>

    <div id="controls">
        <div class="dpad interactive">
            <div id="btn-left" class="btn-dir">◀</div>
            <div id="btn-right" class="btn-dir">▶</div>
        </div>
        
        <div class="ps-cluster interactive">
            <div id="btn-triangle" class="ps-btn">Δ</div>
            <div id="btn-square" class="ps-btn">▢</div>
            <div id="btn-circle" class="ps-btn">🔥</div>
            <div id="btn-cross" class="ps-btn">✕</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Game Score Variables ---
        let score = 0;
        function addScore(points) {
            score += points;
            document.getElementById('scoreBoard').innerText = "SCORE: " + String(score).padStart(5, '0');
        }
        function resetScore() {
            score = 0;
            document.getElementById('scoreBoard').innerText = "SCORE: 00000";
        }

        // --- Sound FX Engine ---
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playOllieSound() {
            initAudio(); if (!audioCtx) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(140, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(380, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playKickflipSound() {
            initAudio(); if (!audioCtx) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(550, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(950, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        function playTurboSound() {
            initAudio(); if (!audioCtx) return;
            // Synthesizes a roaring combustion fire explosion engine crackle
            const bufferSize = audioCtx.sampleRate * 0.25; // 0.25 seconds buffer duration
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // Pure White Noise
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(400, audioCtx.currentTime);
            filter.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.25);

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);

            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        function playSpinSound() {
            initAudio(); if (!audioCtx) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playCrashSound() {
            initAudio(); if (!audioCtx) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(90, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(20, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        // --- Engine Global Parameters ---
        let lines = [];
        let isDrawing = false, isPanning = false;
        let cameraX = 0;
        let startPoint = { x: 0, y: 0 }, panStartPoint = { x: 0, y: 0 }, touchStartPos = { x: 0, y: 0 };
        let hasMovedSignificantly = false;
        let particles = []; // Visual Fire Particle container loop

        const skater = {
            x: 0, y: 0, vx: 0, vy: 0, radius: 12, angle: 0, angularVelocity: 0,
            isActive: false, isOnGround: false, gravity: 0.3, friction: 0.99, airResistance: 0.995,
            
            isKickflipping: false, kickflipTimer: 0, kickflipDuration: 18, boardFlipAngle: 0,
            isSpinning360: false, spinTimer: 0, spinDuration: 24, spinBaseAngle: 0
        };

        const keys = { Left: false, Right: false };

        function spawnSkater(screenX, screenY) {
            initAudio();
            skater.x = screenX + cameraX; skater.y = screenY;
            skater.vx = 0; skater.vy = 0; skater.angle = 0; skater.angularVelocity = 0;
            skater.isKickflipping = false; skater.isSpinning360 = false;
            skater.isActive = true;
            resetScore();
        }

        function triggerKickflip() {
            if (skater.isActive && !skater.isOnGround && !skater.isKickflipping) {
                skater.isKickflipping = true; skater.kickflipTimer = 0; skater.vy = -4.0;
                playKickflipSound();
                addScore(5);
            }
        }

        function triggerOllie() {
            if (skater.isActive) {
                skater.vy = -6.5; skater.isOnGround = false;
                playOllieSound();
                addScore(2);
                skater.isKickflipping = false;
            }
        }

        function triggerTurboBoost() {
            if (skater.isActive) {
                // Calculate directional thrust vectors depending on board tilt orientation angle
                const thrust = 7.5;
                skater.vx += Math.cos(skater.angle) * thrust;
                skater.vy += Math.sin(skater.angle) * thrust - 1.5; // Slight upward pop lifting
                skater.isOnGround = false;
                
                playTurboSound();
                addScore(20);

                // Populate active fire particles bursting outwards backwards from the deck tail edge
                for (let i = 0; i < 25; i++) {
                    particles.push({
                        x: skater.x - Math.cos(skater.angle) * 15,
                        y: skater.y - Math.sin(skater.angle) * 15,
                        vx: -Math.cos(skater.angle) * (Math.random() * 6 + 2) + (Math.random() * 2 - 1),
                        vy: -Math.sin(skater.angle) * (Math.random() * 6 + 2) + (Math.random() * 2 - 1),
                        size: Math.random() * 8 + 4,
                        life: 1.0,
                        decay: Math.random() * 0.05 + 0.03,
                        color: Math.random() > 0.4 ? '#ff5500' : '#ffcc00'
                    });
                }
            }
        }

        function trigger360Spin() {
            if (skater.isActive && !skater.isOnGround && !skater.isSpinning360) {
                skater.isSpinning360 = true; skater.spinTimer = 0;
                skater.spinBaseAngle = skater.angle; skater.vy = -5.0;
                playSpinSound();
                addScore(10);
            }
        }

        // --- Input Mapping Layout configurations ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.Left = true;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.Right = true;
            if (e.key === ' ') spawnSkater(window.innerWidth / 2, 100);
            if (e.key.toLowerCase() === 'r') { lines = []; cameraX = 0; skater.isActive = false; resetScore(); }
            if (e.key.toLowerCase() === 'k') triggerKickflip();
            if (e.key.toLowerCase() === 'x') triggerOllie();
            if (e.key.toLowerCase() === 'o') triggerTurboBoost();
            if (e.key.toLowerCase() === 't') trigger360Spin();
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.Left = false;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.Right = false;
        });

        window.addEventListener('contextmenu', e => e.preventDefault());

        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); keys.Left = true; });
        document.getElementById('btn-left').addEventListener('touchend', () => keys.Left = false);
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); keys.Right = true; });
        document.getElementById('btn-right').addEventListener('touchend', () => keys.Right = false);
        
        document.getElementById('btn-square').addEventListener('touchstart', (e) => { e.preventDefault(); triggerKickflip(); });
        document.getElementById('btn-cross').addEventListener('touchstart', (e) => { e.preventDefault(); triggerOllie(); });
        document.getElementById('btn-circle').addEventListener('touchstart', (e) => { e.preventDefault(); triggerTurboBoost(); });
        document.getElementById('btn-triangle').addEventListener('touchstart', (e) => { e.preventDefault(); trigger360Spin(); });
        
        document.getElementById('btn-clear').addEventListener('click', () => { lines = []; cameraX = 0; skater.isActive = false; resetScore(); });

        // --- Vector Track Processing Line Detection Pointer Listeners ---
        function handlePointerDown(e) {
            if (e.target.closest('#controls') || e.target.closest('#btn-clear')) return;
            const isTouch = e.touches !== undefined, count = isTouch ? e.touches.length : 0;

            if ((!isTouch && e.button === 2) || (isTouch && count === 2)) {
                isDrawing = false; isPanning = true;
                panStartPoint.x = isTouch ? (e.touches[0].clientX + e.touches[1].clientX) / 2 : e.clientX;
                return;
            }
            if (!isPanning && (!isTouch || count === 1)) {
                isDrawing = true;
                const cx = isTouch ? e.touches[0].clientX : e.clientX, cy = isTouch ? e.touches[0].clientY : e.clientY;
                startPoint = { x: cx + cameraX, y: cy }; touchStartPos = { x: cx, y: cy };
                hasMovedSignificantly = false;
            }
        }

        function handlePointerMove(e) {
            const isTouch = e.touches !== undefined;
            if (isPanning) {
                const cx = isTouch ? (e.touches[0].clientX + e.touches[1].clientX) / 2 : e.clientX;
                cameraX -= (cx - panStartPoint.x); panStartPoint.x = cx;
                return;
            }
            if (!isDrawing) return;
            const cx = isTouch ? e.touches[0].clientX : e.clientX, cy = isTouch ? e.touches[0].clientY : e.clientY;
            if (Math.hypot(cx - touchStartPos.x, cy - touchStartPos.y) > 10) hasMovedSignificantly = true;

            if (hasMovedSignificantly) {
                const wx = cx + cameraX;
                if (Math.hypot(wx - startPoint.x, cy - startPoint.y) > 5) {
                    lines.push({ p1: { ...startPoint }, p2: { x: wx, y: cy } });
                    startPoint = { x: wx, y: cy };
                }
            }
        }

        function handlePointerUp() {
            if (isPanning) { isPanning = false; return; }
            if (!isDrawing) return; isDrawing = false;
            if (!hasMovedSignificantly) spawnSkater(touchStartPos.x, touchStartPos.y);
        }

        window.addEventListener('mousedown', handlePointerDown); window.addEventListener('mousemove', handlePointerMove); window.addEventListener('mouseup', handlePointerUp);
        window.addEventListener('touchstart', handlePointerDown, { passive: false }); window.addEventListener('touchmove', handlePointerMove, { passive: false }); window.addEventListener('touchend', handlePointerUp, { passive: false });

        // --- Mathematical Matrices Core Calculations Loop ---
        function closestPointOnSegment(p, a, b) {
            const ab = { x: b.x - a.x, y: b.y - a.y }, ap = { x: p.x - a.x, y: p.y - a.y };
            let t = (ap.x * ab.x + ap.y * ab.y) / (ab.x * ab.x + ab.y * ab.y);
            return { x: a.x + Math.max(0, Math.min(1, t)) * ab.x, y: a.y + Math.max(0, Math.min(1, t)) * ab.y };
        }

        function update() {
            // Process Fire Particles physics execution
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }

            if (!skater.isActive) return;
            skater.vy += skater.gravity;

            if (keys.Left) { skater.angularVelocity -= 0.007; if (skater.isOnGround) skater.vx -= 0.18; }
            if (keys.Right) { skater.angularVelocity += 0.007; if (skater.isOnGround) skater.vx += 0.18; }

            skater.x += skater.vx; skater.y += skater.vy;
            
            if (skater.isSpinning360) {
                skater.spinTimer++;
                const ratio = skater.spinTimer / skater.spinDuration;
                skater.angle = skater.spinBaseAngle + ratio * Math.PI * 2;
                if (skater.spinTimer >= skater.spinDuration) skater.isSpinning360 = false;
            } else {
                skater.angle += skater.angularVelocity;
            }

            skater.vx *= skater.isOnGround ? skater.friction : skater.airResistance;
            skater.vy *= skater.airResistance;
            skater.angularVelocity *= 0.94;

            if (skater.isKickflipping) {
                skater.kickflipTimer++;
                skater.boardFlipAngle = (skater.kickflipTimer / skater.kickflipDuration) * Math.PI * 2;
                if (skater.kickflipTimer >= skater.kickflipDuration) { skater.isKickflipping = false; skater.boardFlipAngle = 0; }
            }

            skater.isOnGround = false;

            lines.forEach(line => {
                const closest = closestPointOnSegment(skater, line.p1, line.p2);
                const distX = skater.x - closest.x, distY = skater.y - closest.y, dist = Math.hypot(distX, distY);

                if (dist < skater.radius) {
                    if (skater.isKickflipping || skater.isSpinning360) { skater.isActive = false; playCrashSound(); resetScore(); return; }

                    skater.isOnGround = true;
                    let nx = distX / (dist || 1), ny = distY / (dist || 1);
                    skater.x += nx * (skater.radius - dist); skater.y += ny * (skater.radius - dist);

                    const dot = skater.vx * nx + skater.vy * ny;
                    if (dot < 0) { skater.vx -= dot * nx * 1.2; skater.vy -= dot * ny * 1.2; }

                    const surfaceAngle = Math.atan2(line.p2.y - line.p1.y, line.p2.x - line.p1.x);
                    let diff = Math.atan2(Math.sin(surfaceAngle - skater.angle), Math.cos(surfaceAngle - skater.angle));
                    skater.angle += diff * 0.2;
                }
            });

            if (skater.y > canvas.height + 300) { skater.isActive = false; playCrashSound(); resetScore(); }
        }

        // --- Render Graph Graphics Scene Draw Engine ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(-cameraX, 0);

            // Matrix Grid Track Layer Background
            ctx.strokeStyle = '#2d2d2d'; ctx.lineWidth = 1;
            const startGridX = Math.floor(cameraX / 40) * 40;
            for(let x = startGridX; x < startGridX + canvas.width + 40; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            for(let y = 0; y < canvas.height; y += 40) { ctx.beginPath(); ctx.moveTo(cameraX, y); ctx.lineTo(cameraX + canvas.width, y); ctx.stroke(); }

            // Drawn Vector Ramps
            ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 5; ctx.lineCap = 'round';
            lines.forEach(line => { ctx.beginPath(); ctx.moveTo(line.p1.x, line.p1.y); ctx.lineTo(line.p2.x, line.p2.y); ctx.stroke(); });

            // Draw Fire Particles Engine
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // Draw Skater Stickman Character
            if (skater.isActive) {
                ctx.save(); ctx.translate(skater.x, skater.y); ctx.rotate(skater.angle);

                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath();
                ctx.moveTo(-5, 4); ctx.lineTo(0, -8); ctx.moveTo(5, 4); ctx.lineTo(0, -8); ctx.lineTo(0, -22); ctx.arc(0, -26, 4, 0, Math.PI * 2);
                if (skater.isKickflipping || skater.isSpinning360) {
                    ctx.moveTo(0, -18); ctx.lineTo(-12, -26); ctx.moveTo(0, -18); ctx.lineTo(12, -26);
                } else {
                    ctx.moveTo(0, -18); ctx.lineTo(-10, -14); ctx.moveTo(0, -18); ctx.lineTo(10, -14);
                }
                ctx.stroke();

                // Deck Processing Engine Layer Matrix
                ctx.save(); ctx.translate(0, 6);
                if (skater.isKickflipping) ctx.scale(1, Math.cos(skater.boardFlipAngle));

                ctx.fillStyle = '#ff3366'; ctx.fillRect(-18, -2.5, 36, 5); // Deck
                ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(-10, 4, 3, 0, Math.PI * 2); ctx.arc(10, 4, 3, 0, Math.PI * 2); ctx.fill(); // Wheels
                ctx.restore(); ctx.restore();
            }
            ctx.restore();
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
