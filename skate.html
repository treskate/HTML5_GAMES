<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canvas Skate & Draw - Sandbox Checkpoint Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 18px;
            border-radius: 10px;
            pointer-events: none;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            border: 1px solid #333;
            z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 18px; color: #00ffcc; text-transform: uppercase; letter-spacing: 1px; }
        p { margin: 4px 0; font-size: 13px; color: #ccc; }
        .score-display {
            font-size: 22px;
            font-weight: bold;
            color: #ffcc00;
            margin-top: 5px;
            font-family: 'Courier New', Courier, monospace;
        }
        
        /* Toolbar Setup */
        #toolbar {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        .tool-btn {
            background: #282828;
            border: 2px solid #555;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .tool-btn.active {
            border-color: #00ffcc;
            background: #15332a;
            color: #00ffcc;
        }
        
        /* Color Swatches Grid */
        .color-picker {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            background: rgba(0,0,0,0.5);
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #444;
        }
        .swatch {
            width: 25px;
            height: 25px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            box-sizing: border-box;
        }
        .swatch.active {
            border-color: #ffcc00;
            transform: scale(1.1);
        }
        
        canvas {
            display: block;
            background: #222;
        }
        
        /* Layout for Gamepad Interface */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 5%;
            right: 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        .interactive { pointer-events: auto; }

        /* Left side Directional Pad */
        .dpad { display: flex; gap: 15px; }
        .btn-dir {
            width: 65px;
            height: 65px;
            background: rgba(40, 40, 40, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-dir:active {
            background: rgba(0, 255, 204, 0.4);
            border-color: #00ffcc;
        }

        /* Right side Action Button Diamond Cluster */
        .ps-cluster {
            position: relative;
            width: 170px;
            height: 170px;
        }
        .ps-btn {
            position: absolute;
            width: 52px;
            height: 52px;
            background: #111;
            border: 3px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        
        #btn-triangle { top: 0; left: 59px; color: #41ffb7; border-color: #1b855a; }
        #btn-triangle:active { background: rgba(65, 255, 183, 0.4); }
        #btn-square { top: 59px; left: 0; color: #f4add5; border-color: #9c5880; font-size: 20px; }
        #btn-square:active { background: rgba(244, 173, 213, 0.4); }
        #btn-circle { top: 59px; right: 0; color: #ff5500; border-color: #b32400; font-size: 14px; }
        #btn-circle:active { background: rgba(255, 85, 0, 0.4); }
        #btn-cross { bottom: 0; left: 59px; color: #8fa1f0; border-color: #3b4e9e; }
        #btn-cross:active { background: rgba(143, 161, 240, 0.4); }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Arcade Infinite Skate</h1>
        <p>▢ Kickflip (+5) | ✕ Ollie (+2) | Δ 360 (+10) | ◯ Turbo (+20)</p>
        <p>Pan Workspace: Right-click + Drag / 2-Finger Touch</p>
        <div class="score-display" id="scoreBoard">SCORE: 00000</div>
    </div>

    <div id="toolbar">
        <button id="btn-draw" class="tool-btn active">Pen Tool</button>
        <button id="btn-erase" class="tool-btn">Eraser</button>
        <div class="color-picker">
            <div class="swatch active" id="swatch-green" style="background: #00ffcc;" title="Green"></div>
            <div class="swatch" id="swatch-blue" style="background: #00bbff;" title="Blue"></div>
            <div class="swatch" id="swatch-white" style="background: #ffffff;" title="White"></div>
            <div class="swatch" id="swatch-red" style="background: #f26666;" title="Red"></div>
            <div class="swatch" id="swatch-yellow" style="background: #ffcc00;" title="Yellow"></div>
            <div class="swatch" id="swatch-purple" style="background: #9b5de5;" title="Purple"></div>
        </div>
        <button id="btn-clear" class="tool-btn" style="border-color:#a63232;">Clear All</button>
    </div>

    <div id="controls">
        <div class="dpad interactive">
            <div id="btn-left" class="btn-dir">◀</div>
            <div id="btn-right" class="btn-dir">▶</div>
        </div>
        
        <div class="ps-cluster interactive">
            <div id="btn-triangle" class="ps-btn">Δ</div>
            <div id="btn-square" class="ps-btn">▢</div>
            <div id="btn-circle" class="ps-btn">🔥</div>
            <div id="btn-cross" class="ps-btn">✕</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Core Engine Global State Parameters ---
        let lines = [];
        let isDrawing = false, isPanning = false;
        
        let cameraX = 0;
        let cameraY = 0;
        
        let startPoint = { x: 0, y: 0 }, panStartPoint = { x: 0, y: 0 }, touchStartPos = { x: 0, y: 0 };
        let hasMovedSignificantly = false;
        let particles = [];
        let forceFollowCamera = true;

        // Interactive Toolbar Mode States
        let currentMode = 'draw';
        let selectedColor = '#00ffcc';

        // Checkpoint Coordinates Memory for Respawning System
        let checkpointX = 0;
        let checkpointY = 0;

        let score = 0;
        function addScore(points) {
            score += points;
            document.getElementById('scoreBoard').innerText = "SCORE: " + String(score).padStart(5, '0');
        }
        function resetScore() {
            score = 0;
            document.getElementById('scoreBoard').innerText = "SCORE: 00000";
        }

        // --- Sound FX Engine ---
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playOllieSound() {
            initAudio(); if (!audioCtx) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(140, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(380, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playKickflipSound() {
            initAudio(); if (!audioCtx) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(550, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(950, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        function playTurboSound() {
            initAudio(); if (!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.25, buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate), data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(400, audioCtx.currentTime);
            filter.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.25);
            const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start();
        }

        function playSpinSound() {
            initAudio(); if (!audioCtx) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playCrashSound() {
            initAudio(); if (!audioCtx) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(90, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(20, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        // --- Skater Physical Object Mapping ---
        const skater = {
            x: 0, y: 0, vx: 0, vy: 0, radius: 12, angle: 0, angularVelocity: 0,
            isActive: false, isOnGround: false, gravity: 0.3, friction: 0.99, airResistance: 0.995,
            isKickflipping: false, kickflipTimer: 0, kickflipDuration: 18, boardFlipAngle: 0,
            isSpinning360: false, spinTimer: 0, spinDuration: 24, spinBaseAngle: 0
        };

        const keys = { Left: false, Right: false };

        function spawnSkater(screenX, screenY) {
            initAudio();
            // Assign world position coordinates
            checkpointX = screenX + cameraX;
            checkpointY = screenY + cameraY;
            
            triggerRespawn();
            resetScore();
        }

        // Resets state logic and places skater back at the active checkpoint marker coordinates
        function triggerRespawn() {
            skater.x = checkpointX;
            skater.y = checkpointY;
            skater.vx = 0;
            skater.vy = 0;
            skater.angle = 0;
            skater.angularVelocity = 0;
            skater.isKickflipping = false;
            skater.isSpinning360 = false;
            skater.isActive = true;
            forceFollowCamera = true;
        }

        function triggerKickflip() {
            if (skater.isActive && !skater.isOnGround && !skater.isKickflipping) {
                skater.isKickflipping = true; skater.kickflipTimer = 0; skater.vy = -4.0;
                forceFollowCamera = true; playKickflipSound(); addScore(5);
            }
        }

        function triggerOllie() {
            if (skater.isActive) {
                skater.vy = -6.5; skater.isOnGround = false;
                forceFollowCamera = true; playOllieSound(); addScore(2);
                skater.isKickflipping = false;
            }
        }

        function triggerTurboBoost() {
            if (skater.isActive) {
                const thrust = 7.5;
                skater.vx += Math.cos(skater.angle) * thrust;
                skater.vy += Math.sin(skater.angle) * thrust - 1.5;
                skater.isOnGround = false; forceFollowCamera = true;
                playTurboSound(); addScore(20);

                for (let i = 0; i < 25; i++) {
                    particles.push({
                        x: skater.x - Math.cos(skater.angle) * 15, y: skater.y - Math.sin(skater.angle) * 15,
                        vx: -Math.cos(skater.angle) * (Math.random() * 6 + 2) + (Math.random() * 2 - 1),
                        vy: -Math.sin(skater.angle) * (Math.random() * 6 + 2) + (Math.random() * 2 - 1),
                        size: Math.random() * 8 + 4, life: 1.0, decay: Math.random() * 0.05 + 0.03,
                        color: Math.random() > 0.4 ? '#ff5500' : '#ffcc00'
                    });
                }
            }
        }

        function trigger360Spin() {
            if (skater.isActive && !skater.isOnGround && !skater.isSpinning360) {
                skater.isSpinning360 = true; skater.spinTimer = 0;
                skater.spinBaseAngle = skater.angle; skater.vy = -5.0;
                forceFollowCamera = true; playSpinSound(); addScore(10);
            }
        }

        // --- Toolbar & Extended Color Matrix Handling ---
        const btnDraw = document.getElementById('btn-draw');
        const btnErase = document.getElementById('btn-erase');
        
        btnDraw.addEventListener('click', () => { currentMode = 'draw'; btnDraw.classList.add('active'); btnErase.classList.remove('active'); });
        btnErase.addEventListener('click', () => { currentMode = 'erase'; btnErase.classList.add('active'); btnDraw.classList.remove('active'); });

        // Map event listeners cleanly across the entire visual palette matrix loop
        document.querySelectorAll('.swatch').forEach(swatch => {
            swatch.addEventListener('click', (e) => {
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                swatch.classList.add('active');
                
                // Read inline hex background styles safely from DOM nodes
                const rgbaColor = swatch.style.backgroundColor;
                // Convert to canvas processing format
                selectedColor = rgbaColor;
                
                currentMode = 'draw';
                btnDraw.classList.add('active'); btnErase.classList.remove('active');
            });
        });

        document.getElementById('btn-clear').addEventListener('click', () => { lines = []; skater.isActive = false; resetScore(); });

        // --- Hardware Device Inputs Map ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') { keys.Left = true; forceFollowCamera = true; }
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') { keys.Right = true; forceFollowCamera = true; }
            if (e.key === ' ') spawnSkater(window.innerWidth / 2, window.innerHeight / 2);
            if (e.key.toLowerCase() === 'k') triggerKickflip();
            if (e.key.toLowerCase() === 'x') triggerOllie();
            if (e.key.toLowerCase() === 'o') triggerTurboBoost();
            if (e.key.toLowerCase() === 't') trigger360Spin();
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.Left = false;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.Right = false;
        });

        window.addEventListener('contextmenu', e => e.preventDefault());

        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); keys.Left = true; forceFollowCamera = true; });
        document.getElementById('btn-left').addEventListener('touchend', () => keys.Left = false);
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); keys.Right = true; forceFollowCamera = true; });
        document.getElementById('btn-right').addEventListener('touchend', () => keys.Right = false);
        
        document.getElementById('btn-square').addEventListener('touchstart', (e) => { e.preventDefault(); triggerKickflip(); });
        document.getElementById('btn-cross').addEventListener('touchstart', (e) => { e.preventDefault(); triggerOllie(); });
        document.getElementById('btn-circle').addEventListener('touchstart', (e) => { e.preventDefault(); triggerTurboBoost(); });
        document.getElementById('btn-triangle').addEventListener('touchstart', (e) => { e.preventDefault(); trigger360Spin(); });

        // --- Infinite Pointer Matrix Tracking ---
        function handlePointerDown(e) {
            if (e.target.closest('#controls') || e.target.closest('#toolbar')) return;
            const isTouch = e.touches !== undefined, count = isTouch ? e.touches.length : 0;

            if ((!isTouch && e.button === 2) || (isTouch && count === 2)) {
                isDrawing = false; isPanning = true; forceFollowCamera = false;
                panStartPoint.x = isTouch ? (e.touches[0].clientX + e.touches[1].clientX) / 2 : e.clientX;
                panStartPoint.y = isTouch ? (e.touches[0].clientY + e.touches[1].clientY) / 2 : e.clientY;
                return;
            }
            if (!isPanning && (!isTouch || count === 1)) {
                isDrawing = true;
                const cx = isTouch ? e.touches[0].clientX : e.clientX, cy = isTouch ? e.touches[0].clientY : e.clientY;
                startPoint = { x: cx + cameraX, y: cy + cameraY }; touchStartPos = { x: cx, y: cy };
                hasMovedSignificantly = false;

                if (currentMode === 'erase') eraseSegmentsAt(cx + cameraX, cy + cameraY);
            }
        }

        function handlePointerMove(e) {
            const isTouch = e.touches !== undefined;
            if (isPanning) {
                const cx = isTouch ? (e.touches[0].clientX + e.touches[1].clientX) / 2 : e.clientX;
                const cy = isTouch ? (e.touches[0].clientY + e.touches[1].clientY) / 2 : e.clientY;
                cameraX -= (cx - panStartPoint.x); cameraY -= (cy - panStartPoint.y);
                panStartPoint.x = cx; panStartPoint.y = cy;
                return;
            }
            if (!isDrawing) return;
            const cx = isTouch ? e.touches[0].clientX : e.clientX, cy = isTouch ? e.touches[0].clientY : e.clientY;
            if (Math.hypot(cx - touchStartPos.x, cy - touchStartPos.y) > 10) hasMovedSignificantly = true;

            const worldX = cx + cameraX;
            const worldY = cy + cameraY;

            if (currentMode === 'draw' && hasMovedSignificantly) {
                if (Math.hypot(worldX - startPoint.x, worldY - startPoint.y) > 5) {
                    lines.push({ p1: { ...startPoint }, p2: { x: worldX, y: worldY }, color: selectedColor });
                    startPoint = { x: worldX, y: worldY };
                }
            } else if (currentMode === 'erase') {
                eraseSegmentsAt(worldX, worldY);
            }
        }

        function handlePointerUp() {
            if (isPanning) { isPanning = false; return; }
            if (!isDrawing) return; isDrawing = false;
            if (currentMode === 'draw' && !hasMovedSignificantly) spawnSkater(touchStartPos.x, touchStartPos.y);
        }

        function eraseSegmentsAt(worldX, worldY) {
            const eraseRadius = 20;
            for (let i = lines.length - 1; i >= 0; i--) {
                let segment = lines[i];
                let closest = closestPointOnSegment({ x: worldX, y: worldY }, segment.p1, segment.p2);
                if (Math.hypot(worldX - closest.x, worldY - closest.y) < eraseRadius) {
                    lines.splice(i, 1);
                }
            }
        }

        window.addEventListener('mousedown', handlePointerDown); window.addEventListener('mousemove', handlePointerMove); window.addEventListener('mouseup', handlePointerUp);
        window.addEventListener('touchstart', handlePointerDown, { passive: false }); window.addEventListener('touchmove', handlePointerMove, { passive: false }); window.addEventListener('touchend', handlePointerUp, { passive: false });

        function closestPointOnSegment(p, a, b) {
            const ab = { x: b.x - a.x, y: b.y - a.y }, ap = { x: p.x - a.x, y: p.y - a.y };
            let t = (ap.x * ab.x + ap.y * ab.y) / (ab.x * ab.x + ab.y * ab.y);
            return { x: a.x + Math.max(0, Math.min(1, t)) * ab.x, y: a.y + Math.max(0, Math.min(1, t)) * ab.y };
        }

        // --- Core Physics System ---
        function update() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }

            if (skater.isActive) {
                skater.vy += skater.gravity;
                if (keys.Left) { skater.angularVelocity -= 0.007; if (skater.isOnGround) skater.vx -= 0.18; }
                if (keys.Right) { skater.angularVelocity += 0.007; if (skater.isOnGround) skater.vx += 0.18; }

                skater.x += skater.vx; skater.y += skater.vy;
                
                if (skater.isSpinning360) {
                    skater.spinTimer++;
                    skater.angle = skater.spinBaseAngle + (skater.spinTimer / skater.spinDuration) * Math.PI * 2;
                    if (skater.spinTimer >= skater.spinDuration) skater.isSpinning360 = false;
                } else {
                    skater.angle += skater.angularVelocity;
                }

                skater.vx *= skater.isOnGround ? skater.friction : skater.airResistance;
                skater.vy *= skater.airResistance; skater.angularVelocity *= 0.94;

                if (skater.isKickflipping) {
                    skater.kickflipTimer++;
                    skater.boardFlipAngle = (skater.kickflipTimer / skater.kickflipDuration) * Math.PI * 2;
                    if (skater.kickflipTimer >= skater.kickflipDuration) { skater.isKickflipping = false; skater.boardFlipAngle = 0; }
                }

                skater.isOnGround = false;

                lines.forEach(line => {
                    const closest = closestPointOnSegment(skater, line.p1, line.p2);
                    const distX = skater.x - closest.x, distY = skater.y - closest.y, dist = Math.hypot(distX, distY);

                    if (dist < skater.radius) {
                        // CRASH TRIGGER CODE OVERHAUL: Respawns skater back at active checkpoint coordinates
                        if (skater.isKickflipping || skater.isSpinning360) { 
                            playCrashSound(); 
                            resetScore(); 
                            triggerRespawn(); 
                            return; 
                        }

                        skater.isOnGround = true;
                        let nx = distX / (dist || 1), ny = distY / (dist || 1);
                        skater.x += nx * (skater.radius - dist); skater.y += ny * (skater.radius - dist);

                        const dot = skater.vx * nx + skater.vy * ny;
                        if (dot < 0) { skater.vx -= dot * nx * 1.2; skater.vy -= dot * ny * 1.2; }

                        const surfaceAngle = Math.atan2(line.p2.y - line.p1.y, line.p2.x - line.p1.x);
                        let diff = Math.atan2(Math.sin(surfaceAngle - skater.angle), Math.cos(surfaceAngle - skater.angle));
                        skater.angle += diff * 0.2;
                    }
                });

                // Void boundary fall trigger also loops skater back into active checkpoint coordinates
                if (skater.y > cameraY + canvas.height + 600) {
                    playCrashSound();
                    resetScore();
                    triggerRespawn();
                }
            }

            if (skater.isActive && forceFollowCamera && !isPanning) {
                cameraX += ((skater.x - canvas.width / 2) - cameraX) * 0.08;
                cameraY += ((skater.y - canvas.height / 2) - cameraY) * 0.08;
            }
        }

        // --- Render Engine ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(-cameraX, -cameraY);

            // Grid Architecture
            ctx.strokeStyle = '#2d2d2d'; ctx.lineWidth = 1;
            const startGridX = Math.floor(cameraX / 40) * 40;
            const startGridY = Math.floor(cameraY / 40) * 40;
            for(let x = startGridX; x < startGridX + canvas.width + 40; x += 40) { ctx.beginPath(); ctx.moveTo(x, cameraY); ctx.lineTo(x, cameraY + canvas.height); ctx.stroke(); }
            for(let y = startGridY; y < startGridY + canvas.height + 40; y += 40) { ctx.beginPath(); ctx.moveTo(cameraX, y); ctx.lineTo(cameraX + canvas.width, y); ctx.stroke(); }

            // Dynamic Path Vectors 
            ctx.lineWidth = 5; ctx.lineCap = 'round';
            lines.forEach(line => { ctx.strokeStyle = line.color || '#00ffcc'; ctx.beginPath(); ctx.moveTo(line.p1.x, line.p1.y); ctx.lineTo(line.p2.x, line.p2.y); ctx.stroke(); });

            // Fire Matrix Elements
            particles.forEach(p => {
                ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            });

            // Draw Skater Figure
            if (skater.isActive) {
                ctx.save(); ctx.translate(skater.x, skater.y); ctx.rotate(skater.angle);

                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath();
                ctx.moveTo(-5, 4); ctx.lineTo(0, -8); ctx.moveTo(5, 4); ctx.lineTo(0, -8); ctx.lineTo(0, -22); ctx.arc(0, -26, 4, 0, Math.PI * 2);
                if (skater.isKickflipping || skater.isSpinning360) {
                    ctx.moveTo(0, -18); ctx.lineTo(-12, -26); ctx.moveTo(0, -18); ctx.lineTo(12, -26);
                } else {
                    ctx.moveTo(0, -18); ctx.lineTo(-10, -14); ctx.moveTo(0, -18); ctx.lineTo(10, -14);
                }
                ctx.stroke();

                // Board Assembly
                ctx.save(); ctx.translate(0, 6);
                if (skater.isKickflipping) ctx.scale(1, Math.cos(skater.boardFlipAngle));
                ctx.fillStyle = '#ff3366'; ctx.fillRect(-18, -2.5, 36, 5);
                ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(-10, 4, 3, 0, Math.PI * 2); ctx.arc(10, 4, 3, 0, Math.PI * 2); ctx.fill();
                ctx.restore(); ctx.restore();
            }
            ctx.restore();
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
