<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canvas Skate & Draw - Infinite Camera</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 16px; color: #00ffcc; }
        p { margin: 3px 0; font-size: 12px; color: #ccc; }
        canvas {
            display: block;
            background: #222;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 5%;
            right: 5%;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }
        .btn-group {
            display: flex;
            gap: 15px;
        }
        .btn {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            color: white;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            touch-action: none;
        }
        .btn:active {
            background: rgba(0, 255, 204, 0.4);
            border-color: #00ffcc;
        }
        #btn-kickflip {
            background: rgba(255, 51, 102, 0.2);
            border-color: rgba(255, 51, 102, 0.5);
        }
        #btn-kickflip:active {
            background: rgba(255, 51, 102, 0.6);
            border-color: #ff3366;
        }
        #btn-clear {
            position: absolute;
            top: 10px;
            right: 10px;
            width: auto;
            height: auto;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Sketch & Skate (Infinite)</h1>
        <p><strong>1 Finger / Left Click:</strong> Draw ramps / Tap to spawn</p>
        <p><strong>2 Fingers / Right Click Drag:</strong> Pan camera view</p>
    </div>

    <button id="btn-clear" class="btn">Clear</button>

    <div id="controls">
        <div class="btn-group">
            <div id="btn-left" class="btn">◀</div>
            <div id="btn-right" class="btn">▶</div>
        </div>
        <div id="btn-kickflip" class="btn">K</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Game State & Global Camera Offset
        let lines = [];
        let isDrawing = false;
        let isPanning = false;
        
        let cameraX = 0; // Tracks the camera offset scrolling position
        let startPoint = { x: 0, y: 0 };
        let panStartPoint = { x: 0, y: 0 };
        let touchStartPos = { x: 0, y: 0 };
        let hasMovedSignificantly = false;

        const skater = {
            x: 0, y: 0, vx: 0, vy: 0, radius: 12, angle: 0, angularVelocity: 0,
            isActive: false, isOnGround: false, gravity: 0.3, friction: 0.99, airResistance: 0.995,
            isKickflipping: false, kickflipTimer: 0, kickflipDuration: 20, boardFlipAngle: 0
        };

        const keys = { Left: false, Right: false };

        function spawnSkater(screenX, screenY) {
            // Account for camera offset when calculating the world coordinates to spawn
            skater.x = screenX + cameraX;
            skater.y = screenY;
            skater.vx = 0;
            skater.vy = 0;
            skater.angle = 0;
            skater.angularVelocity = 0;
            skater.isKickflipping = false;
            skater.boardFlipAngle = 0;
            skater.isActive = true;
        }

        function triggerKickflip() {
            if (skater.isActive && !skater.isOnGround && !skater.isKickflipping) {
                skater.isKickflipping = true;
                skater.kickflipTimer = 0;
                skater.vy -= 1.5; 
            }
        }

        // --- Inputs ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.Left = true;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.Right = true;
            if (e.key === ' ') spawnSkater(window.innerWidth / 2, 100);
            if (e.key.toLowerCase() === 'r') { lines = []; cameraX = 0; skater.isActive = false; }
            if (e.key.toLowerCase() === 'k') triggerKickflip();
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.Left = false;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.Right = false;
        });

        // Block context menu on right click so we can use it to pan seamlessly
        window.addEventListener('contextmenu', e => e.preventDefault());

        const bLeft = document.getElementById('btn-left');
        const bRight = document.getElementById('btn-right');
        const bFlip = document.getElementById('btn-kickflip');
        const bClear = document.getElementById('btn-clear');

        bLeft.addEventListener('touchstart', (e) => { e.preventDefault(); keys.Left = true; });
        bLeft.addEventListener('touchend', () => keys.Left = false);
        bRight.addEventListener('touchstart', (e) => { e.preventDefault(); keys.Right = true; });
        bRight.addEventListener('touchend', () => keys.Right = false);
        bFlip.addEventListener('touchstart', (e) => { e.preventDefault(); triggerKickflip(); });
        bClear.addEventListener('touchstart', (e) => { e.preventDefault(); lines = []; cameraX = 0; skater.isActive = false; });
        bClear.addEventListener('click', () => { lines = []; cameraX = 0; skater.isActive = false; });

        // --- Input Controller Engine Supporting Pan Mechanics ---
        function handlePointerDown(e) {
            if (e.target.closest('#controls') || e.target.closest('#btn-clear')) return;

            const isTouchEvent = e.touches !== undefined;
            const touchCount = isTouchEvent ? e.touches.length : 0;

            // Trigger Panning Mode: Right Click (button 2) OR Two Finger Drag
            if ((!isTouchEvent && e.button === 2) || (isTouchEvent && touchCount === 2)) {
                isDrawing = false;
                isPanning = true;
                const clientX = isTouchEvent ? (e.touches[0].clientX + e.touches[1].clientX) / 2 : e.clientX;
                panStartPoint.x = clientX;
                return;
            }

            // Normal Drawing Mode: Left Click or One Finger Touch
            if (!isPanning && (!isTouchEvent || touchCount === 1)) {
                isDrawing = true;
                const clientX = isTouchEvent ? e.touches[0].clientX : e.clientX;
                const clientY = isTouchEvent ? e.touches[0].clientY : e.clientY;
                
                // Add camera offset context to the permanent drawn line values
                startPoint = { x: clientX + cameraX, y: clientY };
                touchStartPos = { x: clientX, y: clientY };
                hasMovedSignificantly = false;
            }
        }

        function handlePointerMove(e) {
            const isTouchEvent = e.touches !== undefined;

            if (isPanning) {
                const clientX = isTouchEvent ? (e.touches[0].clientX + e.touches[1].clientX) / 2 : e.clientX;
                const dx = clientX - panStartPoint.x;
                cameraX -= dx; // Moves camera opposite direction of drag
                panStartPoint.x = clientX;
                return;
            }

            if (!isDrawing) return;
            const clientX = isTouchEvent ? e.touches[0].clientX : e.clientX;
            const clientY = isTouchEvent ? e.touches[0].clientY : e.clientY;

            const distFromStart = Math.hypot(clientX - touchStartPos.x, clientY - touchStartPos.y);
            if (distFromStart > 10) hasMovedSignificantly = true;

            if (hasMovedSignificantly) {
                const worldX = clientX + cameraX;
                const dist = Math.hypot(worldX - startPoint.x, clientY - startPoint.y);
                if (dist > 5) {
                    lines.push({ p1: { ...startPoint }, p2: { x: worldX, y: clientY } });
                    startPoint = { x: worldX, y: clientY };
                }
            }
        }

        function handlePointerUp(e) {
            if (isPanning) {
                // If using touch, keep panning active until all fingers lift
                if (e.touches && e.touches.length > 0) return;
                isPanning = false;
                return;
            }

            if (!isDrawing) return;
            isDrawing = false;

            if (!hasMovedSignificantly) {
                spawnSkater(touchStartPos.x, touchStartPos.y);
            }
        }

        window.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);

        window.addEventListener('touchstart', handlePointerDown, { passive: false });
        window.addEventListener('touchmove', handlePointerMove, { passive: false });
        window.addEventListener('touchend', handlePointerUp, { passive: false });


        // --- Physics Engine ---
        function closestPointOnSegment(p, a, b) {
            const ab = { x: b.x - a.x, y: b.y - a.y };
            const ap = { x: p.x - a.x, y: p.y - a.y };
            let t = (ap.x * ab.x + ap.y * ab.y) / (ab.x * ab.x + ab.y * ab.y);
            t = Math.max(0, Math.min(1, t));
            return { x: a.x + t * ab.x, y: a.y + t * ab.y };
        }

        function update() {
            if (skater.isActive) {
                skater.vy += skater.gravity;

                if (keys.Left) {
                    skater.angularVelocity -= 0.007;
                    if (skater.isOnGround) skater.vx -= 0.18;
                }
                if (keys.Right) {
                    skater.angularVelocity += 0.007;
                    if (skater.isOnGround) skater.vx += 0.18;
                }

                skater.x += skater.vx;
                skater.y += skater.vy;
                skater.angle += skater.angularVelocity;

                skater.vx *= skater.isOnGround ? skater.friction : skater.airResistance;
                skater.vy *= skater.airResistance;
                skater.angularVelocity *= 0.94;

                if (skater.isKickflipping) {
                    skater.kickflipTimer++;
                    const progress = skater.kickflipTimer / skater.kickflipDuration;
                    skater.boardFlipAngle = progress * Math.PI * 2;

                    if (skater.kickflipTimer >= skater.kickflipDuration) {
                        skater.isKickflipping = false;
                        skater.boardFlipAngle = 0;
                    }
                }

                skater.isOnGround = false;

                lines.forEach(line => {
                    const closest = closestPointOnSegment(skater, line.p1, line.p2);
                    const distX = skater.x - closest.x;
                    const distY = skater.y - closest.y;
                    const distance = Math.hypot(distX, distY);

                    if (distance < skater.radius) {
                        if (skater.isKickflipping) {
                            skater.isActive = false; // Wipe out!
                            return;
                        }

                        skater.isOnGround = true;
                        let nx = distX / (distance || 1);
                        let ny = distY / (distance || 1);

                        const penetration = skater.radius - distance;
                        skater.x += nx * penetration;
                        skater.y += ny * penetration;

                        const dotProduct = skater.vx * nx + skater.vy * ny;
                        if (dotProduct < 0) {
                            skater.vx -= dotProduct * nx * 1.2;
                            skater.vy -= dotProduct * ny * 1.2;
                        }

                        const surfaceAngle = Math.atan2(line.p2.y - line.p1.y, line.p2.x - line.p1.x);
                        let diff = surfaceAngle - skater.angle;
                        diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                        skater.angle += diff * 0.2; 
                    }
                });

                // Bottom bound wipeout test (Left/Right is now infinite, so boundary check is dropped)
                if (skater.y > canvas.height + 300) {
                    skater.isActive = false;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // Core camera operation: slides all elements drawn inside this matrix block
            ctx.translate(-cameraX, 0);

            // Draw Parallax Grid Background relative to camera step
            ctx.strokeStyle = '#2d2d2d';
            ctx.lineWidth = 1;
            const startGridX = Math.floor(cameraX / 40) * 40;
            for(let x = startGridX; x < startGridX + canvas.width + 40; x += 40) { 
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); 
            }
            for(let y = 0; y < canvas.height; y += 40) { 
                ctx.beginPath(); ctx.moveTo(cameraX, y); ctx.lineTo(cameraX + canvas.width, y); ctx.stroke(); 
            }

            // Draw Infinite Ramps
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            lines.forEach(line => {
                ctx.beginPath(); ctx.moveTo(line.p1.x, line.p1.y); ctx.lineTo(line.p2.x, line.p2.y); ctx.stroke();
            });

            // Draw Skater
            if (skater.isActive) {
                ctx.save();
                ctx.translate(skater.x, skater.y);
                ctx.rotate(skater.angle);

                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(-5, 4); ctx.lineTo(0, -8);
                ctx.moveTo(5, 4); ctx.lineTo(0, -8);
                ctx.lineTo(0, -22);
                ctx.arc(0, -26, 4, 0, Math.PI * 2);
                if (skater.isKickflipping) {
                    ctx.moveTo(0, -18); ctx.lineTo(-12, -26);
                    ctx.moveTo(0, -18); ctx.lineTo(12, -26);
                } else {
                    ctx.moveTo(0, -18); ctx.lineTo(-10, -14);
                    ctx.moveTo(0, -18); ctx.lineTo(10, -14);
                }
                ctx.stroke();

                ctx.save();
                ctx.translate(0, 6);
                if (skater.isKickflipping) {
                    ctx.scale(1, Math.cos(skater.boardFlipAngle));
                }

                ctx.fillStyle = '#ff3366';
                ctx.fillRect(-18, -2.5, 36, 5);

                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(-10, 4, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(10, 4, 3, 0, Math.PI * 2); ctx.fill();
                
                ctx.restore();
                ctx.restore();
            }

            ctx.restore(); // Exit camera transformation matrix

            // Draw active temporary sketch line guide (drawn on screen space, not world space)
            if (isDrawing) {
                ctx.strokeStyle = 'rgba(0, 255, 204, 0.4)';
                ctx.lineWidth = 3;
                ctx.beginPath(); 
                ctx.moveTo(startPoint.x - cameraX, startPoint.y); 
                ctx.lineTo(touchStartPos.x + (startPoint.x - cameraX - touchStartPos.x), startPoint.y); // dynamic recalculation
                // Fallback direct draw for clarity
                ctx.clearRect(0,0,0,0); 
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
